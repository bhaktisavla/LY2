<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Up and Down Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* ---------------- SPLASH ---------------- */

#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#splash img{
    width:min(320px,70vw);
}

/* ---------------- GAME ---------------- */

#game{
    width:100%;
    height:100%;
    display:none;
    position:relative;
    overflow:hidden;

    /* GARDEN BACKGROUND */
    background-image:url("assets/garden.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Light overlay */

#game::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.05);
    z-index:0;
}

/* ---------------- ROUNDS ---------------- */

.round{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    z-index:2;
}

.round.active{
    display:flex;
}

/* ---------------- QUESTION ---------------- */

.topBar{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:5px;
    z-index:5;
}

.questionBox{
    background:#fff7c8;
    color:#5d3b00;
    padding:12px 18px;
    border-radius:18px;
    font-size:clamp(18px,2.6vw,30px);
    font-weight:bold;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.18);
    max-width:82%;
}

.speakBtn{
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    background:#95d5a5;
    font-size:24px;
    cursor:pointer;
}

.speakBtn:active{
    transform:scale(0.95);
}

/* ---------------- IMAGE AREA ---------------- */

.imageArea{
    position:relative;
    width:100%;
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* IMPORTANT FIX */

.sceneImage{
    width:100%;
    max-width:1000px;
    max-height:76vh;
    object-fit:contain;
    position:relative;
    z-index:1;
    pointer-events:none;
}

/* CANVAS FIXED */

.drawCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:999;
    touch-action:none;
    pointer-events:auto;
}

/* ---------------- FINISH SCREEN ---------------- */

#finishScreen{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(255,255,255,0.9);
    z-index:9999;
    overflow:hidden;
}

#finishScreen h1{
    font-size:clamp(38px,5vw,70px);
    color:#ff7a54;
    margin-bottom:15px;
}

#finishScreen p{
    font-size:clamp(22px,3vw,36px);
    color:#333;
    margin-bottom:25px;
}

#playAgainBtn{
    padding:16px 30px;
    border:none;
    border-radius:18px;
    background:#ffb347;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}

#playAgainBtn:active{
    transform:scale(0.95);
}

/* ---------------- CONFETTI ---------------- */

.confetti{
    position:absolute;
    width:14px;
    height:14px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{

    0%{
        transform:translateY(-10vh) rotate(0deg);
    }

    100%{
        transform:translateY(120vh) rotate(720deg);
    }
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .sceneImage{
        max-height:70vh;
    }

    .questionBox{
        font-size:20px;
    }

    .speakBtn{
        width:48px;
        height:48px;
    }

    #playAgainBtn{
        font-size:22px;
    }
}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">

    <img src="assets/innovine-logo.png">

</div>

<!-- GAME -->

<div id="game">

    <!-- ROUND 1 -->

    <div class="round active">

        <div class="topBar">

            <div class="questionBox">
                Circle the child who is down.
            </div>

            <button class="speakBtn"
            onclick="speakQuestion(0)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/downboy.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 2 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">
                Circle the girl who is up.
            </div>

            <button class="speakBtn"
            onclick="speakQuestion(1)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/upgirl.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 3 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">
                Circle the boy who is up.
            </div>

            <button class="speakBtn"
            onclick="speakQuestion(2)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/upboy.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 4 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">
                Circle the girl who is down.
            </div>

            <button class="speakBtn"
            onclick="speakQuestion(3)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/downgirl.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- FINISH SCREEN -->

    <div id="finishScreen">

        <h1>Wonderful Work! 🎉</h1>

        <p>You completed all 4 rounds.</p>

        <button id="playAgainBtn">
            Play Again
        </button>

    </div>

</div>

<!-- AUDIO -->

<audio id="correctSound"
src="assets/right.mp3"></audio>

<audio id="clapSound"
src="assets/clapping.mp3"></audio>

<script>

/* ---------------- QUESTIONS ---------------- */

const questions = [

    "Circle the child who is down.",

    "Circle the girl who is up.",

    "Circle the boy who is up.",

    "Circle the girl who is down."
];

let currentRound = 0;

/* ---------------- SPLASH ---------------- */

window.onload = () => {

    setTimeout(()=>{

        document.getElementById("splash").style.display="none";

        document.getElementById("game").style.display="block";

        initializeCanvas();

        speakQuestion(0);

    },5000);
};

/* ---------------- SPEECH ---------------- */

function speakQuestion(index){

    speechSynthesis.cancel();

    const speech =
    new SpeechSynthesisUtterance(
        questions[index]
    );

    speech.rate=0.9;

    speechSynthesis.speak(speech);
}

/* ---------------- CANVAS ---------------- */

function initializeCanvas(){

    const canvases =
    document.querySelectorAll(".drawCanvas");

    canvases.forEach((canvas,index)=>{

        resizeCanvas(canvas);

        const ctx =
        canvas.getContext("2d");

        /* GREEN LINE */

        ctx.strokeStyle="#00c853";

        ctx.lineWidth=10;

        ctx.lineCap="round";

        ctx.lineJoin="round";

        let drawing=false;

        function getPosition(e){

            const rect =
            canvas.getBoundingClientRect();

            let x,y;

            if(e.touches){

                x=e.touches[0].clientX-rect.left;

                y=e.touches[0].clientY-rect.top;

            }else{

                x=e.clientX-rect.left;

                y=e.clientY-rect.top;
            }

            return {x,y};
        }

        function start(e){

            drawing=true;

            const pos=getPosition(e);

            ctx.beginPath();

            ctx.moveTo(pos.x,pos.y);
        }

        function draw(e){

            if(!drawing) return;

            e.preventDefault();

            const pos=getPosition(e);

            ctx.lineTo(pos.x,pos.y);

            ctx.stroke();
        }

        function stop(){

            if(!drawing) return;

            drawing=false;

            completeRound(index);
        }

        /* MOUSE */

        canvas.addEventListener(
            "mousedown",start
        );

        canvas.addEventListener(
            "mousemove",draw
        );

        canvas.addEventListener(
            "mouseup",stop
        );

        /* TOUCH */

        canvas.addEventListener(
            "touchstart",
            start,
            {passive:false}
        );

        canvas.addEventListener(
            "touchmove",
            draw,
            {passive:false}
        );

        canvas.addEventListener(
            "touchend",
            stop
        );
    });

    window.addEventListener(
        "resize",
        ()=>{

            document
            .querySelectorAll(".drawCanvas")
            .forEach(resizeCanvas);
        }
    );
}

/* ---------------- RESIZE ---------------- */

function resizeCanvas(canvas){

    canvas.width=
    canvas.offsetWidth;

    canvas.height=
    canvas.offsetHeight;
}

/* ---------------- COMPLETE ROUND ---------------- */

function completeRound(index){

    if(index!==currentRound) return;

    /* RIGHT SOUND */

    const correct =
    document.getElementById(
        "correctSound"
    );

    correct.currentTime=0;

    correct.play();

    /* CLAPPING SOUND */

    setTimeout(()=>{

        const clap =
        document.getElementById(
            "clapSound"
        );

        clap.currentTime=0;

        clap.play();

    },500);

    /* NEXT ROUND */

    setTimeout(()=>{

        nextRound();

    },2200);
}

/* ---------------- NEXT ROUND ---------------- */

function nextRound(){

    const rounds =
    document.querySelectorAll(".round");

    rounds[currentRound]
    .classList.remove("active");

    currentRound++;

    if(currentRound>=rounds.length){

        finishGame();

        return;
    }

    rounds[currentRound]
    .classList.add("active");

    speakQuestion(currentRound);
}

/* ---------------- FINISH ---------------- */

function finishGame(){

    document.getElementById(
        "finishScreen"
    ).style.display="flex";

    createConfetti();

    const speech =
    new SpeechSynthesisUtterance(
        "Wonderful work. You completed all four rounds."
    );

    speech.rate=0.9;

    speechSynthesis.speak(speech);
}

/* ---------------- CONFETTI ---------------- */

function createConfetti(){

    const finish =
    document.getElementById(
        "finishScreen"
    );

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add(
            "confetti"
        );

        confetti.style.left=
        Math.random()*100+"vw";

        confetti.style.background=
        randomColor();

        confetti.style.animationDuration=
        (Math.random()*3+3)+"s";

        finish.appendChild(confetti);
    }
}

function randomColor(){

    const colors=[

        "#ff7a54",
        "#ffd166",
        "#7bd389",
        "#6ec6ff",
        "#c792ea"
    ];

    return colors[
        Math.floor(
            Math.random()*colors.length
        )
    ];
}

/* ---------------- PLAY AGAIN ---------------- */

document.getElementById(
    "playAgainBtn"
).addEventListener(
    "click",
    ()=>{

        location.reload();
    }
);

</script>

</body>
</html>
