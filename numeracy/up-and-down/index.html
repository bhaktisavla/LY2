<!-- 
IMPORTANT:
THIS VERSION FIXES:

1. GREEN LINE NOW SHOWS IN ALL 4 ROUNDS
2. ROUND 2 CORRECT AREA FIXED
3. WRONG SOUND / RIGHT SOUND FIXED
4. GAME ONLY MOVES WHEN CORRECT ANSWER IS CIRCLED
5. MOBILE + TABLET + LAPTOP FRIENDLY
-->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Up and Down Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* ---------------- SPLASH ---------------- */

#splash{

    position:fixed;
    inset:0;

    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999999;
}

#splash img{

    width:min(320px,70vw);
}

/* ---------------- GAME ---------------- */

#game{

    width:100%;
    height:100%;

    display:none;

    position:relative;

    overflow:hidden;

    background-image:url("assets/garden.jpg");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;
}

/* ---------------- ROUND ---------------- */

.round{

    position:absolute;

    inset:0;

    display:none;

    flex-direction:column;

    justify-content:space-between;

    align-items:center;

    padding:10px;
}

.round.active{

    display:flex;
}

/* ---------------- QUESTION ---------------- */

.topBar{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:10px;

    margin-top:5px;

    z-index:1000;
}

.questionBox{

    background:#fff7c7;

    color:#5b3b00;

    padding:12px 18px;

    border-radius:18px;

    font-size:clamp(18px,2.5vw,30px);

    font-weight:bold;

    text-align:center;

    max-width:82%;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.speakBtn{

    width:52px;

    height:52px;

    border:none;

    border-radius:50%;

    background:#93d7a7;

    font-size:24px;

    cursor:pointer;
}

/* ---------------- IMAGE AREA ---------------- */

.imageArea{

    position:relative;

    width:100%;

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;
}

/* IMAGE */

.sceneImage{

    width:100%;

    max-width:1000px;

    max-height:76vh;

    object-fit:contain;

    position:absolute;

    inset:0;

    margin:auto;

    z-index:1;

    pointer-events:none;
}

/* CANVAS */

.drawCanvas{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    z-index:99999;

    pointer-events:auto;

    touch-action:none;
}

/* ---------------- FINISH SCREEN ---------------- */

#finishScreen{

    position:absolute;

    inset:0;

    background:rgba(255,255,255,0.93);

    display:none;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    z-index:999999;
}

#finishScreen h1{

    font-size:clamp(36px,5vw,70px);

    color:#ff7a54;

    margin-bottom:15px;
}

#finishScreen p{

    font-size:clamp(20px,3vw,36px);

    margin-bottom:25px;
}

#playAgainBtn{

    padding:16px 30px;

    border:none;

    border-radius:18px;

    background:#ffb347;

    color:white;

    font-size:24px;

    font-weight:bold;

    cursor:pointer;
}

/* ---------------- CONFETTI ---------------- */

.confetti{

    position:absolute;

    width:14px;

    height:14px;

    top:-20px;

    animation:fall linear forwards;
}

@keyframes fall{

    from{

        transform:translateY(-10vh)
        rotate(0deg);
    }

    to{

        transform:translateY(120vh)
        rotate(720deg);
    }
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .sceneImage{

        max-height:70vh;
    }

    .questionBox{

        font-size:20px;
    }
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

    <img src="assets/innovine-logo.png">

</div>

<!-- GAME -->

<div id="game">

    <!-- ROUND 1 -->

    <div class="round active">

        <div class="topBar">

            <div class="questionBox">

                Circle the child who is down.

            </div>

            <button class="speakBtn"
            onclick="speakQuestion(0)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/downboy.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 2 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">

                Circle the girl who is up.

            </div>

            <button class="speakBtn"
            onclick="speakQuestion(1)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/upgirl.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 3 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">

                Circle the boy who is up.

            </div>

            <button class="speakBtn"
            onclick="speakQuestion(2)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/upboy.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- ROUND 4 -->

    <div class="round">

        <div class="topBar">

            <div class="questionBox">

                Circle the girl who is down.

            </div>

            <button class="speakBtn"
            onclick="speakQuestion(3)">
            🔊
            </button>

        </div>

        <div class="imageArea">

            <img src="assets/downgirl.png"
            class="sceneImage">

            <canvas class="drawCanvas"></canvas>

        </div>

    </div>

    <!-- FINISH -->

    <div id="finishScreen">

        <h1>Wonderful Work! 🎉</h1>

        <p>You completed all 4 rounds.</p>

        <button id="playAgainBtn">

            Play Again

        </button>

    </div>

</div>

<!-- AUDIO -->

<audio id="rightSound"
src="assets/right.mp3"
preload="auto"></audio>

<audio id="wrongSound"
src="assets/wrong.mp3"
preload="auto"></audio>

<audio id="clapSound"
src="assets/clapping.mp3"
preload="auto"></audio>

<script>

/* ---------------- QUESTIONS ---------------- */

const questions = [

    "Circle the child who is down.",

    "Circle the girl who is up.",

    "Circle the boy who is up.",

    "Circle the girl who is down."
];

/* ---------------- CORRECT POSITIONS ---------------- */
/* THESE WERE FIXED */

const correctAreas = [

    {x:35,y:60,r:18}, /* ROUND 1 */

    {x:68,y:33,r:20}, /* ROUND 2 FIXED */

    {x:68,y:30,r:20}, /* ROUND 3 */

    {x:35,y:60,r:18}  /* ROUND 4 */
];

let currentRound = 0;

/* ---------------- SPLASH ---------------- */

window.onload = ()=>{

    setTimeout(()=>{

        document.getElementById("splash")
        .style.display="none";

        document.getElementById("game")
        .style.display="block";

        setupCanvas();

        speakQuestion(0);

    },5000);
};

/* ---------------- SPEECH ---------------- */

function speakQuestion(index){

    speechSynthesis.cancel();

    const speech =
    new SpeechSynthesisUtterance(
        questions[index]
    );

    speech.rate = 0.9;

    speechSynthesis.speak(speech);
}

/* ---------------- CANVAS ---------------- */

function setupCanvas(){

    const canvases =
    document.querySelectorAll(".drawCanvas");

    canvases.forEach((canvas,index)=>{

        resizeCanvas(canvas);

        const ctx =
        canvas.getContext("2d");

        /* GREEN LINE */

        ctx.strokeStyle = "#00ff44";

        ctx.lineWidth = 16;

        ctx.lineCap = "round";

        ctx.lineJoin = "round";

        let drawing = false;

        let points = [];

        function getPosition(e){

            const rect =
            canvas.getBoundingClientRect();

            let x,y;

            if(e.touches){

                x =
                e.touches[0].clientX
                - rect.left;

                y =
                e.touches[0].clientY
                - rect.top;

            }else{

                x =
                e.clientX
                - rect.left;

                y =
                e.clientY
                - rect.top;
            }

            return {x,y};
        }

        function start(e){

            drawing = true;

            points = [];

            const pos =
            getPosition(e);

            points.push(pos);

            ctx.beginPath();

            ctx.moveTo(pos.x,pos.y);
        }

        function draw(e){

            if(!drawing) return;

            e.preventDefault();

            const pos =
            getPosition(e);

            points.push(pos);

            ctx.lineTo(pos.x,pos.y);

            ctx.stroke();

            /* IMPORTANT FIX */

            ctx.beginPath();

            ctx.moveTo(pos.x,pos.y);
        }

        function stop(){

            if(!drawing) return;

            drawing = false;

            checkAnswer(points,index);
        }

        /* MOUSE */

        canvas.addEventListener(
            "mousedown",
            start
        );

        canvas.addEventListener(
            "mousemove",
            draw
        );

        canvas.addEventListener(
            "mouseup",
            stop
        );

        /* TOUCH */

        canvas.addEventListener(
            "touchstart",
            start,
            {passive:false}
        );

        canvas.addEventListener(
            "touchmove",
            draw,
            {passive:false}
        );

        canvas.addEventListener(
            "touchend",
            stop
        );
    });

    window.addEventListener(
        "resize",
        ()=>{

            document
            .querySelectorAll(".drawCanvas")
            .forEach(resizeCanvas);
        }
    );
}

/* ---------------- RESIZE ---------------- */

function resizeCanvas(canvas){

    canvas.width =
    canvas.offsetWidth;

    canvas.height =
    canvas.offsetHeight;
}

/* ---------------- CHECK ANSWER ---------------- */

function checkAnswer(points,index){

    if(index !== currentRound) return;

    const canvas =
    document.querySelectorAll(
        ".drawCanvas"
    )[index];

    const area =
    correctAreas[index];

    const correctX =
    (area.x/100) * canvas.width;

    const correctY =
    (area.y/100) * canvas.height;

    const radius =
    (area.r/100) * canvas.width;

    let isCorrect = false;

    for(let p of points){

        const dx = p.x - correctX;

        const dy = p.y - correctY;

        const distance =
        Math.sqrt(dx*dx + dy*dy);

        if(distance < radius){

            isCorrect = true;

            break;
        }
    }

    if(isCorrect){

        playCorrect();

    }else{

        playWrong();
    }
}

/* ---------------- CORRECT ---------------- */

function playCorrect(){

    const right =
    document.getElementById(
        "rightSound"
    );

    right.currentTime = 0;

    right.play();

    setTimeout(()=>{

        const clap =
        document.getElementById(
            "clapSound"
        );

        clap.currentTime = 0;

        clap.play();

    },700);

    setTimeout(()=>{

        nextRound();

    },2200);
}

/* ---------------- WRONG ---------------- */

function playWrong(){

    const wrong =
    document.getElementById(
        "wrongSound"
    );

    wrong.currentTime = 0;

    wrong.play();
}

/* ---------------- NEXT ROUND ---------------- */

function nextRound(){

    const rounds =
    document.querySelectorAll(
        ".round"
    );

    rounds[currentRound]
    .classList.remove("active");

    currentRound++;

    if(currentRound >= rounds.length){

        finishGame();

        return;
    }

    rounds[currentRound]
    .classList.add("active");

    speakQuestion(currentRound);
}

/* ---------------- FINISH ---------------- */

function finishGame(){

    document.getElementById(
        "finishScreen"
    ).style.display="flex";

    createConfetti();

    const speech =
    new SpeechSynthesisUtterance(
        "Wonderful work. You completed all four rounds."
    );

    speech.rate = 0.9;

    speechSynthesis.speak(speech);
}

/* ---------------- CONFETTI ---------------- */

function createConfetti(){

    const finish =
    document.getElementById(
        "finishScreen"
    );

    const colors = [

        "#ff7a54",
        "#ffd166",
        "#7bd389",
        "#6ec6ff",
        "#c792ea"
    ];

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add(
            "confetti"
        );

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.background =
        colors[
            Math.floor(
                Math.random()*colors.length
            )
        ];

        confetti.style.animationDuration =
        (Math.random()*3+3)+"s";

        finish.appendChild(
            confetti
        );
    }
}

/* ---------------- PLAY AGAIN ---------------- */

document.getElementById(
    "playAgainBtn"
).addEventListener(
    "click",
    ()=>{

        location.reload();
    }
);

</script>

</body>
</html>
