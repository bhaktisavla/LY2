<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Full and Empty Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:#FFF7EC;
}

#game{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* SCREENS */

.screen{
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px;
}

.active{
    display:flex;
}

/* LOGO */

#logoScreen{
    justify-content:center;
    align-items:center;
    background:#FFF1D7;
}

#logoScreen img{
    width:260px;
    max-width:80%;
}

/* TOP BAR */

.topBar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.round{
    background:#F4A261;
    color:white;
    padding:8px 16px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
}

.speakerBtn{
    border:none;
    background:#5DBB9A;
    color:white;
    width:52px;
    height:52px;
    border-radius:50%;
    font-size:24px;
}

/* QUESTION */

.question{
    font-size:22px;
    font-weight:bold;
    color:#5A4331;
    text-align:center;
    margin-bottom:10px;
    line-height:1.3;
}

/* ROUND 1 */

.round1Grid{
    width:100%;
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    justify-items:center;
    align-items:center;
}

.card{
    width:100%;
    max-width:220px;
    background:white;
    border-radius:20px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
    border:5px solid transparent;
    transition:0.2s;
}

.card img{
    width:100%;
    height:130px;
    object-fit:contain;
}

/* ROUND 2 FIXED */

.round2Grid{
    width:100%;
    flex:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    align-items:center;
    justify-items:center;
}

.round2Grid .card{
    max-width:180px;
    padding:8px;
}

.round2Grid .card img{
    height:90px;
}

/* CORRECT / WRONG */

.correct{
    border-color:#69C37B;
    background:#EFFAF2;
}

.wrong{
    border-color:#E76F51;
    background:#FFF0EC;
}

/* ROUND 3 */

.dragContainer{
    width:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    margin-bottom:8px;
}

.dragItem{
    background:white;
    border-radius:14px;
    padding:4px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.dragItem img{
    width:100%;
    height:45px;
    object-fit:contain;
}

.dropArea{
    width:100%;
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex:1;
}

.dropZone{
    width:48%;
    background:white;
    border:4px dashed #C7AF88;
    border-radius:18px;
    padding:6px;
    min-height:130px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.dropZone img{
    width:50px;
    margin-bottom:4px;
}

.dropZone h2{
    color:#5A4331;
    font-size:18px;
    margin-bottom:4px;
}

.dropItems{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:3px;
}

/* FINISH */

#finishScreen{
    justify-content:center;
    align-items:center;
    background:#FFF2D8;
}

#finishScreen h1{
    font-size:40px;
    color:#5A4331;
    margin-bottom:20px;
}

.playAgain{
    border:none;
    background:#F4A261;
    color:white;
    padding:16px 28px;
    border-radius:18px;
    font-size:24px;
}

/* CONFETTI */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* MOBILE */

@media(max-width:768px){

    .question{
        font-size:17px;
    }

    .round1Grid{
        gap:6px;
    }

    .card{
        max-width:150px;
    }

    .card img{
        height:85px;
    }

    /* ROUND 2 MOBILE FIX */

    .round2Grid{
        gap:5px;
    }

    .round2Grid .card{
        max-width:115px;
        padding:5px;
    }

    .round2Grid .card img{
        height:58px;
    }

    .dragItem img{
        height:35px;
    }

    .dropZone{
        min-height:100px;
    }

    .dropZone img{
        width:40px;
    }

    .dropZone h2{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div id="game">

<!-- LOGO -->

<div class="screen active" id="logoScreen">
    <img src="assets/innovine-logo.png">
</div>

<!-- ROUND 1 -->

<div class="screen" id="round1">

    <div class="topBar">

        <div class="round">
            Round 1
        </div>

        <button class="speakerBtn" onclick="speak(round1Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Tap all the objects which are FULL.
    </div>

    <div class="round1Grid">

        <div class="card r1" data-correct="false">
            <img src="assets/emptyvessel.png">
        </div>

        <div class="card r1" data-correct="true">
            <img src="assets/fullbin.png">
        </div>

        <div class="card r1" data-correct="false">
            <img src="assets/emptybin.png">
        </div>

        <div class="card r1" data-correct="true">
            <img src="assets/fullvessel.png">
        </div>

    </div>

</div>

<!-- ROUND 2 -->

<div class="screen" id="round2">

    <div class="topBar">

        <div class="round">
            Round 2
        </div>

        <button class="speakerBtn" onclick="speak(round2Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Tap all the objects which are EMPTY.
    </div>

    <div class="round2Grid">

        <div class="card r2" data-correct="false">
            <img src="assets/fullpopcorn.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/emptypopcorn.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/nestempty.png">
        </div>

        <div class="card r2" data-correct="false">
            <img src="assets/nestfull.png">
        </div>

        <div class="card r2" data-correct="false">
            <img src="assets/fullfries.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/emptyfries.png">
        </div>

    </div>

</div>

<!-- ROUND 3 -->

<div class="screen" id="round3">

    <div class="topBar">

        <div class="round">
            Round 3
        </div>

        <button class="speakerBtn" onclick="speak(round3Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Drag EMPTY objects to EMPTY and FULL objects to FULL.
    </div>

    <div class="dragContainer">

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/basketempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/basketfulltomato.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/cartfull.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/cartempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/nestempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/nestfull.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/chestempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/chestfull.png">
        </div>

    </div>

    <div class="dropArea">

        <div class="dropZone" data-zone="empty">

            <img src="assets/empty.png">

            <h2>EMPTY</h2>

            <div class="dropItems"></div>

        </div>

        <div class="dropZone" data-zone="full">

            <img src="assets/full.png">

            <h2>FULL</h2>

            <div class="dropItems"></div>

        </div>

    </div>

</div>

<!-- FINISH -->

<div class="screen" id="finishScreen">

    <h1>Wonderful Job!</h1>

    <button class="playAgain" onclick="location.reload()">
        Play Again
    </button>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const round1Voice =
"Tap all the objects which are full.";

const round2Voice =
"Tap all the objects which are empty.";

const round3Voice =
"Drag empty objects to empty and full objects to full.";

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* START */

setTimeout(()=>{

    document.getElementById("logoScreen")
    .classList.remove("active");

    document.getElementById("round1")
    .classList.add("active");

    speak(round1Voice);

},5000);

/* SPEAK */

function speak(text){

    if("speechSynthesis" in window){

        speechSynthesis.cancel();

        let speech =
        new SpeechSynthesisUtterance(text);

        speech.rate = 0.9;

        speechSynthesis.speak(speech);
    }
}

/* ROUND 1 */

let round1Correct = 0;

document.querySelectorAll(".r1").forEach(card=>{

    card.addEventListener("click",()=>{

        if(card.classList.contains("done")) return;

        if(card.dataset.correct === "true"){

            card.classList.add("correct","done");

            correctSound.play();

            round1Correct++;

            if(round1Correct === 2){

                setTimeout(()=>{

                    document.getElementById("round1")
                    .classList.remove("active");

                    document.getElementById("round2")
                    .classList.add("active");

                    speak(round2Voice);

                },1000);
            }

        }else{

            card.classList.add("wrong");

            wrongSound.play();

            setTimeout(()=>{
                card.classList.remove("wrong");
            },600);
        }

    });

});

/* ROUND 2 */

let round2Correct = 0;

document.querySelectorAll(".r2").forEach(card=>{

    card.addEventListener("click",()=>{

        if(card.classList.contains("done")) return;

        if(card.dataset.correct === "true"){

            card.classList.add("correct","done");

            correctSound.play();

            round2Correct++;

            if(round2Correct === 3){

                setTimeout(()=>{

                    document.getElementById("round2")
                    .classList.remove("active");

                    document.getElementById("round3")
                    .classList.add("active");

                    speak(round3Voice);

                },1000);
            }

        }else{

            card.classList.add("wrong");

            wrongSound.play();

            setTimeout(()=>{
                card.classList.remove("wrong");
            },600);
        }

    });

});

/* DRAG DROP */

let dragged = null;
let placed = 0;

document.querySelectorAll(".dragItem").forEach(item=>{

    item.addEventListener("dragstart",()=>{
        dragged = item;
    });

    item.addEventListener("touchstart",()=>{
        dragged = item;
    });

});

document.querySelectorAll(".dropZone").forEach(zone=>{

    zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
    });

    zone.addEventListener("drop",(e)=>{
        e.preventDefault();
        handleDrop(zone);
    });

    zone.addEventListener("touchend",()=>{
        handleDrop(zone);
    });

});

function handleDrop(zone){

    if(!dragged) return;

    const itemType = dragged.dataset.type;
    const zoneType = zone.dataset.zone;

    if(itemType === zoneType){

        correctSound.play();

        zone.querySelector(".dropItems")
        .appendChild(dragged);

        placed++;

        if(placed === 8){

            setTimeout(()=>{
                finishGame();
            },1000);
        }

    }else{

        wrongSound.play();
    }

    dragged = null;
}

/* FINISH */

function finishGame(){

    document.getElementById("round3")
    .classList.remove("active");

    document.getElementById("finishScreen")
    .classList.add("active");

    createConfetti();
}

/* CONFETTI */

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100+"vw";

        confetti.style.background =
        ["#F4A261","#2A9D8F","#E9C46A","#90CAF9","#E76F51"]
        [Math.floor(Math.random()*5)];

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);
    }
}

</script>

</body>
</html>
