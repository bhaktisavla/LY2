<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Full and Empty Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:Arial,sans-serif;
    background:#FFF7EC;
    overflow:hidden;
}

#game{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* SCREENS */

.screen{
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    padding:10px;
}

.active{
    display:flex;
}

/* LOGO */

#logoScreen{
    justify-content:center;
    align-items:center;
    background:#FFF1D7;
}

#logoScreen img{
    width:260px;
    max-width:80%;
}

/* TOP BAR */

.topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.round{
    background:#F4A261;
    color:white;
    padding:8px 14px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
}

.speakerBtn{
    border:none;
    width:52px;
    height:52px;
    border-radius:50%;
    background:#5DBB9A;
    color:white;
    font-size:24px;
}

/* QUESTION */

.question{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#5A4331;
    margin-bottom:10px;
}

/* ROUND 1 + 2 */

.grid{
    flex:1;
    display:grid;
    gap:10px;
    justify-items:center;
    align-items:center;
}

.round1Grid{
    grid-template-columns:1fr 1fr;
}

.round2Grid{
    grid-template-columns:repeat(3,1fr);
}

.card{
    width:100%;
    max-width:200px;
    background:white;
    border-radius:20px;
    padding:8px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
    border:5px solid transparent;
    transition:0.2s;
}

.card img{
    width:100%;
    height:110px;
    object-fit:contain;
}

.correct{
    border-color:#69C37B;
    background:#EFFAF2;
}

.wrong{
    border-color:#E76F51;
    background:#FFF0EC;
}

/* ROUND 3 */

.dragContainer{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    margin-bottom:8px;
}

.dragItem{
    background:white;
    border-radius:12px;
    padding:4px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    touch-action:none;
}

.dragItem img{
    width:100%;
    height:42px;
    object-fit:contain;
    pointer-events:none;
}

.dropArea{
    flex:1;
    display:flex;
    gap:8px;
}

.dropZone{
    flex:1;
    background:white;
    border:4px dashed #C7AF88;
    border-radius:16px;
    padding:5px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:120px;
}

.dropZone img{
    width:45px;
}

.dropZone h2{
    font-size:18px;
    color:#5A4331;
    margin:4px 0;
}

.dropItems{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:3px;
}

.dropItems img{
    width:100%;
    height:40px;
    object-fit:contain;
}

/* FINISH */

#finishScreen{
    justify-content:center;
    align-items:center;
    background:#FFF2D8;
}

#finishScreen h1{
    font-size:40px;
    color:#5A4331;
    margin-bottom:20px;
}

.playAgain{
    border:none;
    background:#F4A261;
    color:white;
    padding:16px 26px;
    border-radius:18px;
    font-size:22px;
}

/* CONFETTI */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* MOBILE */

@media(max-width:768px){

    .question{
        font-size:18px;
    }

    .card{
        max-width:120px;
    }

    .card img{
        height:70px;
    }

    .round2Grid{
        gap:5px;
    }

    .dragItem img{
        height:30px;
    }

    .dropZone{
        min-height:95px;
    }

    .dropZone img{
        width:35px;
    }

    .dropZone h2{
        font-size:15px;
    }

}

</style>
</head>

<body>

<div id="game">

<!-- LOGO -->

<div class="screen active" id="logoScreen">
    <img src="assets/innovine-logo.png">
</div>

<!-- ROUND 1 -->

<div class="screen" id="round1">

    <div class="topBar">

        <div class="round">
            Round 1
        </div>

        <button class="speakerBtn" onclick="speak(round1Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Tap all the objects which are FULL.
    </div>

    <div class="grid round1Grid">

        <div class="card r1" data-correct="false">
            <img src="assets/emptyvessel.png">
        </div>

        <div class="card r1" data-correct="true">
            <img src="assets/fullbin.png">
        </div>

        <div class="card r1" data-correct="false">
            <img src="assets/emptybin.png">
        </div>

        <div class="card r1" data-correct="true">
            <img src="assets/fullvessel.png">
        </div>

    </div>

</div>

<!-- ROUND 2 -->

<div class="screen" id="round2">

    <div class="topBar">

        <div class="round">
            Round 2
        </div>

        <button class="speakerBtn" onclick="speak(round2Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Tap all the objects which are EMPTY.
    </div>

    <div class="grid round2Grid">

        <div class="card r2" data-correct="false">
            <img src="assets/fullpopcorn.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/emptypopcorn.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/nestempty.png">
        </div>

        <div class="card r2" data-correct="false">
            <img src="assets/nestfull.png">
        </div>

        <div class="card r2" data-correct="false">
            <img src="assets/fullfries.png">
        </div>

        <div class="card r2" data-correct="true">
            <img src="assets/emptyfries.png">
        </div>

    </div>

</div>

<!-- ROUND 3 -->

<div class="screen" id="round3">

    <div class="topBar">

        <div class="round">
            Round 3
        </div>

        <button class="speakerBtn" onclick="speak(round3Voice)">
            🔊
        </button>

    </div>

    <div class="question">
        Drag EMPTY objects to EMPTY and FULL objects to FULL.
    </div>

    <div class="dragContainer">

        <div class="dragItem" data-type="empty">
            <img src="assets/basketempty.png">
        </div>

        <div class="dragItem" data-type="full">
            <img src="assets/basketfulltomato.png">
        </div>

        <div class="dragItem" data-type="full">
            <img src="assets/cartfull.png">
        </div>

        <div class="dragItem" data-type="empty">
            <img src="assets/cartempty.png">
        </div>

        <div class="dragItem" data-type="empty">
            <img src="assets/nestempty.png">
        </div>

        <div class="dragItem" data-type="full">
            <img src="assets/nestfull.png">
        </div>

        <div class="dragItem" data-type="empty">
            <img src="assets/chestempty.png">
        </div>

        <div class="dragItem" data-type="full">
            <img src="assets/chestfull.png">
        </div>

    </div>

    <div class="dropArea">

        <div class="dropZone" data-zone="empty">

            <img src="assets/empty.png">

            <h2>EMPTY</h2>

            <div class="dropItems"></div>

        </div>

        <div class="dropZone" data-zone="full">

            <img src="assets/full.png">

            <h2>FULL</h2>

            <div class="dropItems"></div>

        </div>

    </div>

</div>

<!-- FINISH -->

<div class="screen" id="finishScreen">

    <h1>Wonderful Job!</h1>

    <button class="playAgain" onclick="location.reload()">
        Play Again
    </button>

</div>

</div>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* VOICE */

const round1Voice =
"Tap all the objects which are full.";

const round2Voice =
"Tap all the objects which are empty.";

const round3Voice =
"Drag empty objects to empty and full objects to full.";

/* AUDIO */

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* START */

setTimeout(()=>{

    document.getElementById("logoScreen")
    .classList.remove("active");

    document.getElementById("round1")
    .classList.add("active");

    speak(round1Voice);

},5000);

/* SPEECH */

function speak(text){

    if("speechSynthesis" in window){

        speechSynthesis.cancel();

        let speech =
        new SpeechSynthesisUtterance(text);

        speech.rate = 0.9;

        speechSynthesis.speak(speech);
    }
}

/* ROUND 1 */

let round1Correct = 0;

document.querySelectorAll(".r1").forEach(card=>{

    card.addEventListener("click",()=>{

        if(card.classList.contains("done")) return;

        if(card.dataset.correct === "true"){

            card.classList.add("correct","done");

            correctSound.currentTime = 0;
            correctSound.play();

            round1Correct++;

            if(round1Correct === 2){

                setTimeout(()=>{

                    document.getElementById("round1")
                    .classList.remove("active");

                    document.getElementById("round2")
                    .classList.add("active");

                    speak(round2Voice);

                },1000);

            }

        }else{

            wrongSound.currentTime = 0;
            wrongSound.play();

            card.classList.add("wrong");

            setTimeout(()=>{
                card.classList.remove("wrong");
            },600);

        }

    });

});

/* ROUND 2 */

let round2Correct = 0;

document.querySelectorAll(".r2").forEach(card=>{

    card.addEventListener("click",()=>{

        if(card.classList.contains("done")) return;

        if(card.dataset.correct === "true"){

            card.classList.add("correct","done");

            correctSound.currentTime = 0;
            correctSound.play();

            round2Correct++;

            if(round2Correct === 3){

                setTimeout(()=>{

                    document.getElementById("round2")
                    .classList.remove("active");

                    document.getElementById("round3")
                    .classList.add("active");

                    speak(round3Voice);

                },1000);

            }

        }else{

            wrongSound.currentTime = 0;
            wrongSound.play();

            card.classList.add("wrong");

            setTimeout(()=>{
                card.classList.remove("wrong");
            },600);

        }

    });

});

/* ROUND 3 MOBILE FIX */

let placed = 0;

document.querySelectorAll(".dragItem").forEach(item=>{

    item.addEventListener("click",()=>{

        selectedItem = item;

        document.querySelectorAll(".dragItem")
        .forEach(i=>i.style.border="none");

        item.style.border =
        "4px solid #5DBB9A";

    });

});

let selectedItem = null;

document.querySelectorAll(".dropZone").forEach(zone=>{

    zone.addEventListener("click",()=>{

        if(!selectedItem) return;

        const itemType =
        selectedItem.dataset.type;

        const zoneType =
        zone.dataset.zone;

        if(itemType === zoneType){

            correctSound.currentTime = 0;
            correctSound.play();

            zone.querySelector(".dropItems")
            .appendChild(selectedItem);

            selectedItem.style.border = "none";

            selectedItem.style.pointerEvents =
            "none";

            placed++;

            selectedItem = null;

            if(placed === 8){

                setTimeout(()=>{
                    finishGame();
                },1000);

            }

        }else{

            wrongSound.currentTime = 0;
            wrongSound.play();

        }

    });

});

/* FINISH */

function finishGame(){

    document.getElementById("round3")
    .classList.remove("active");

    document.getElementById("finishScreen")
    .classList.add("active");

    createConfetti();
}

/* CONFETTI */

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100+"vw";

        confetti.style.background =
        ["#F4A261","#2A9D8F","#E9C46A","#90CAF9","#E76F51"]
        [Math.floor(Math.random()*5)];

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);

    }

}

</script>

</body>
</html>
