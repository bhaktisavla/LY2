<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Full and Empty Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family: Arial, sans-serif;
    overflow:hidden;
    background:#FFF6E9;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* SCREENS */

.screen{
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px;
}

.active{
    display:flex;
}

/* LOGO */

#logoScreen{
    justify-content:center;
    align-items:center;
    background:#FFE4B5;
}

#logoScreen img{
    width:260px;
    max-width:80%;
    animation:flash 1s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

/* TOP */

.topBar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.roundTag{
    background:#F4A261;
    color:#fff;
    padding:10px 16px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
}

.speakerBtn{
    background:#69C3A5;
    border:none;
    color:#fff;
    padding:10px 16px;
    border-radius:14px;
    font-size:22px;
}

/* QUESTION */

.question{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    color:#5A3E2B;
    margin-bottom:10px;
    line-height:1.3;
}

/* GRID */

.grid{
    flex:1;
    width:100%;
    display:grid;
    gap:12px;
    align-items:center;
    justify-items:center;
}

.grid.two{
    grid-template-columns:1fr 1fr;
}

.grid.three{
    grid-template-columns:1fr 1fr 1fr;
}

.card{
    width:100%;
    max-width:240px;
    background:#fff;
    border-radius:22px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border:5px solid transparent;
    transition:0.2s;
}

.card img{
    width:100%;
    max-height:160px;
    object-fit:contain;
}

.label{
    margin-top:8px;
    font-size:22px;
    font-weight:bold;
    color:#5A3E2B;
}

/* FEEDBACK */

.correct{
    border-color:#6BCB77;
    background:#F1FFF2;
}

.wrong{
    border-color:#E76F51;
    background:#FFF1EE;
}

/* ROUND 3 */

.dragArea{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
}

.dragItem{
    width:90px;
    background:#fff;
    border-radius:16px;
    padding:6px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

.dragItem img{
    width:100%;
    height:70px;
    object-fit:contain;
}

.dropContainer{
    width:100%;
    display:flex;
    justify-content:space-around;
    gap:10px;
}

.dropZone{
    width:45%;
    min-height:190px;
    background:#fff;
    border-radius:20px;
    border:4px dashed #C8B89A;
    text-align:center;
    padding:10px;
}

.dropZone img{
    width:100px;
}

.dropZone h2{
    margin-top:6px;
    color:#5A3E2B;
}

/* FINISH */

#finishScreen{
    justify-content:center;
    align-items:center;
    background:#FFF2D8;
}

#finishScreen h1{
    font-size:42px;
    color:#5A3E2B;
    margin-bottom:20px;
}

.playAgain{
    border:none;
    background:#F4A261;
    color:#fff;
    font-size:24px;
    padding:16px 28px;
    border-radius:18px;
}

/* CONFETTI */

.confetti{
    position:absolute;
    width:12px;
    height:12px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* RESPONSIVE */

@media(max-width:768px){

    .question{
        font-size:18px;
    }

    .label{
        font-size:18px;
    }

    .card img{
        max-height:110px;
    }

    .dragItem{
        width:70px;
    }

    .dragItem img{
        height:55px;
    }

    .dropZone{
        min-height:150px;
    }

    .dropZone img{
        width:70px;
    }

}

</style>
</head>

<body>

<div id="game">

<!-- LOGO SCREEN -->

<div class="screen active" id="logoScreen">
    <img src="assets/innovine-logo.png">
</div>

<!-- ROUND 1 -->

<div class="screen" id="round1">

    <div class="topBar">
        <div class="roundTag">Round 1</div>
        <button class="speakerBtn" onclick="speak(round1Text)">🔊</button>
    </div>

    <div class="question">
        Tap all the objects which are FULL.
    </div>

    <div class="grid two">

        <div class="card selectable r1" data-correct="true">
            <img src="assets/fullvessel.png">
            <div class="label">FULL VESSEL</div>
        </div>

        <div class="card selectable r1" data-correct="false">
            <img src="assets/emptyvessel.png">
            <div class="label">EMPTY VESSEL</div>
        </div>

        <div class="card selectable r1" data-correct="true">
            <img src="assets/fullbin.png">
            <div class="label">FULL BIN</div>
        </div>

        <div class="card selectable r1" data-correct="false">
            <img src="assets/emptybin.png">
            <div class="label">EMPTY BIN</div>
        </div>

    </div>

</div>

<!-- ROUND 2 -->

<div class="screen" id="round2">

    <div class="topBar">
        <div class="roundTag">Round 2</div>
        <button class="speakerBtn" onclick="speak(round2Text)">🔊</button>
    </div>

    <div class="question">
        Tap all the objects which are EMPTY.
    </div>

    <div class="grid three">

        <div class="card selectable r2" data-correct="false">
            <img src="assets/fullpopcorn.png">
            <div class="label">FULL POPCORN</div>
        </div>

        <div class="card selectable r2" data-correct="true">
            <img src="assets/emptypopcorn.png">
            <div class="label">EMPTY POPCORN</div>
        </div>

        <div class="card selectable r2" data-correct="false">
            <img src="assets/fullnest.png">
            <div class="label">FULL NEST</div>
        </div>

        <div class="card selectable r2" data-correct="true">
            <img src="assets/emptynest.png">
            <div class="label">EMPTY NEST</div>
        </div>

        <div class="card selectable r2" data-correct="false">
            <img src="assets/fullfries.png">
            <div class="label">FULL FRIES</div>
        </div>

        <div class="card selectable r2" data-correct="true">
            <img src="assets/emptyfries.png">
            <div class="label">EMPTY FRIES</div>
        </div>

    </div>

</div>

<!-- ROUND 3 -->

<div class="screen" id="round3">

    <div class="topBar">
        <div class="roundTag">Round 3</div>
        <button class="speakerBtn" onclick="speak(round3Text)">🔊</button>
    </div>

    <div class="question">
        Drag EMPTY objects to EMPTY and FULL objects to FULL.
    </div>

    <div class="dragArea" id="dragArea">

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/basketempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/basketfulltomato.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/cartempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/cartfull.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/chestempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/chestfull.png">
        </div>

        <div class="dragItem" draggable="true" data-type="empty">
            <img src="assets/nestempty.png">
        </div>

        <div class="dragItem" draggable="true" data-type="full">
            <img src="assets/nestfull.png">
        </div>

    </div>

    <div class="dropContainer">

        <div class="dropZone" data-zone="empty">
            <img src="assets/empty.png">
            <h2>EMPTY</h2>
        </div>

        <div class="dropZone" data-zone="full">
            <img src="assets/full.png">
            <h2>FULL</h2>
        </div>

    </div>

</div>

<!-- FINISH -->

<div class="screen" id="finishScreen">

    <h1>Wonderful Job!</h1>

    <button class="playAgain" onclick="location.reload()">
        Play Again
    </button>

</div>

</div>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* TEXT */

const round1Text = "Tap all the objects which are full.";
const round2Text = "Tap all the objects which are empty.";
const round3Text = "Drag empty objects to empty and full objects to full.";

/* AUDIO */

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

/* START */

setTimeout(()=>{
    showScreen("round1");
    speak(round1Text);
},5000);

/* SCREEN */

function showScreen(id){

    document.querySelectorAll(".screen").forEach(screen=>{
        screen.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

/* VOICE */

function speak(text){

    if('speechSynthesis' in window){

        speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);

        utter.rate = 0.9;
        utter.pitch = 1;

        speechSynthesis.speak(utter);
    }
}

/* ROUND 1 + ROUND 2 */

function setupRound(roundClass,nextScreen,nextVoice){

    const allCorrect = document.querySelectorAll("."+roundClass+'[data-correct="true"]').length;

    let correctCount = 0;

    document.querySelectorAll("."+roundClass).forEach(card=>{

        card.addEventListener("click",()=>{

            if(card.classList.contains("done")) return;

            const correct = card.dataset.correct === "true";

            if(correct){

                card.classList.add("correct","done");

                correctSound.play();

                correctCount++;

                if(correctCount === allCorrect){

                    setTimeout(()=>{

                        showScreen(nextScreen);

                        speak(nextVoice);

                    },1000);
                }

            }else{

                card.classList.add("wrong");

                wrongSound.play();

                setTimeout(()=>{
                    card.classList.remove("wrong");
                },700);
            }
        });

    });

}

setupRound("r1","round2",round2Text);
setupRound("r2","round3",round3Text);

/* ROUND 3 DRAG DROP */

let draggedItem = null;
let placedItems = 0;

document.querySelectorAll(".dragItem").forEach(item=>{

    item.addEventListener("dragstart",()=>{
        draggedItem = item;
    });

    item.addEventListener("touchstart",()=>{
        draggedItem = item;
    });

});

document.querySelectorAll(".dropZone").forEach(zone=>{

    zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
    });

    zone.addEventListener("drop",(e)=>{
        e.preventDefault();
        handleDrop(zone);
    });

    zone.addEventListener("touchend",()=>{
        handleDrop(zone);
    });

});

function handleDrop(zone){

    if(!draggedItem) return;

    const itemType = draggedItem.dataset.type;
    const zoneType = zone.dataset.zone;

    if(itemType === zoneType){

        correctSound.play();

        zone.appendChild(draggedItem);

        draggedItem.style.width = "65px";

        placedItems++;

        if(placedItems === 8){

            setTimeout(()=>{
                finishGame();
            },1200);
        }

    }else{

        wrongSound.play();
    }

    draggedItem = null;
}

/* FINISH */

function finishGame(){

    showScreen("finishScreen");

    createConfetti();
}

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100+"vw";

        confetti.style.background =
        ["#F4A261","#E76F51","#2A9D8F","#E9C46A","#A8DADC"]
        [Math.floor(Math.random()*5)];

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);
    }
}

</script>

</body>
</html>
