<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Full and Empty Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#FFF6E9;
}

#game{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* SCREENS */

.screen{
    width:100%;
    height:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px;
}

.active{
    display:flex;
}

/* LOGO */

#logoScreen{
    justify-content:center;
    align-items:center;
    background:#FFE4B5;
}

#logoScreen img{
    width:280px;
    max-width:80%;
    animation:flash 1s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

/* TOP BAR */

.topbar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.round{
    background:#F4A261;
    color:white;
    padding:10px 18px;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
}

.speaker{
    background:#69C3A5;
    color:white;
    border:none;
    border-radius:14px;
    width:55px;
    height:55px;
    font-size:24px;
}

/* QUESTION */

.question{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#5B4332;
    margin-bottom:10px;
    line-height:1.3;
}

/* CARDS */

.cards{
    flex:1;
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    align-items:center;
    justify-items:center;
}

.card{
    background:white;
    border-radius:24px;
    width:100%;
    max-width:280px;
    padding:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
    border:5px solid transparent;
    text-align:center;
    transition:0.2s;
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.label{
    font-size:24px;
    font-weight:bold;
    color:#5B4332;
    margin-top:8px;
}

.correct{
    border-color:#67C587;
    background:#F2FFF5;
}

.wrong{
    border-color:#E76F51;
    background:#FFF0EC;
}

/* ROUND 3 */

.drag-top{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:12px;
}

.drag-item{
    width:90px;
    background:white;
    padding:8px;
    border-radius:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
}

.drag-item img{
    width:100%;
    height:70px;
    object-fit:contain;
}

.drop-area{
    width:100%;
    display:flex;
    justify-content:space-around;
    align-items:flex-start;
    gap:10px;
}

.drop-zone{
    width:45%;
    min-height:200px;
    background:white;
    border:4px dashed #D0B28A;
    border-radius:20px;
    padding:10px;
    text-align:center;
}

.drop-zone img{
    width:90px;
}

.drop-zone h2{
    color:#5B4332;
    margin-top:6px;
}

/* FINISH */

#finishScreen{
    justify-content:center;
    align-items:center;
    background:#FFF0D8;
}

#finishScreen h1{
    font-size:42px;
    color:#5B4332;
    margin-bottom:20px;
}

.playAgain{
    background:#F4A261;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:18px;
    font-size:24px;
}

/* CONFETTI */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* MOBILE */

@media(max-width:768px){

    .question{
        font-size:18px;
    }

    .card img{
        height:120px;
    }

    .label{
        font-size:18px;
    }

    .drag-item{
        width:70px;
    }

    .drag-item img{
        height:55px;
    }

    .drop-zone{
        min-height:150px;
    }
}

</style>
</head>

<body>

<div id="game">

<!-- LOGO -->

<div class="screen active" id="logoScreen">
    <img src="assets/innovine-logo.png">
</div>

<!-- ROUND 1 -->

<div class="screen" id="round1">

    <div class="topbar">
        <div class="round">Round 1</div>
        <button class="speaker" onclick="speak(round1Voice)">🔊</button>
    </div>

    <div class="question">
        Tap all the objects which are FULL.
    </div>

    <div class="cards">

        <div class="card r1" data-answer="full">
            <img src="assets/fullvessel.png">
            <div class="label">FULL VESSEL</div>
        </div>

        <div class="card r1" data-answer="empty">
            <img src="assets/emptyvessel.png">
            <div class="label">EMPTY VESSEL</div>
        </div>

        <div class="card r1" data-answer="full">
            <img src="assets/fullbin.png">
            <div class="label">FULL BIN</div>
        </div>

        <div class="card r1" data-answer="empty">
            <img src="assets/empty.png">
            <div class="label">EMPTY BIN</div>
        </div>

    </div>

</div>

<!-- ROUND 2 -->

<div class="screen" id="round2">

    <div class="topbar">
        <div class="round">Round 2</div>
        <button class="speaker" onclick="speak(round2Voice)">🔊</button>
    </div>

    <div class="question">
        Tap all the objects which are EMPTY.
    </div>

    <div class="cards">

        <div class="card r2" data-answer="full">
            <img src="assets/fullpopcorn.png">
            <div class="label">FULL POPCORN</div>
        </div>

        <div class="card r2" data-answer="empty">
            <img src="assets/emptypopcorn.png">
            <div class="label">EMPTY POPCORN</div>
        </div>

        <div class="card r2" data-answer="full">
            <img src="assets/fullfries.png">
            <div class="label">FULL FRIES</div>
        </div>

        <div class="card r2" data-answer="empty">
            <img src="assets/emptyfries.png">
            <div class="label">EMPTY FRIES</div>
        </div>

        <div class="card r2" data-answer="full">
            <img src="assets/nestfull.png">
            <div class="label">FULL NEST</div>
        </div>

        <div class="card r2" data-answer="empty">
            <img src="assets/nestempty.png">
            <div class="label">EMPTY NEST</div>
        </div>

    </div>

</div>

<!-- ROUND 3 -->

<div class="screen" id="round3">

    <div class="topbar">
        <div class="round">Round 3</div>
        <button class="speaker" onclick="speak(round3Voice)">🔊</button>
    </div>

    <div class="question">
        Drag EMPTY objects to EMPTY and FULL objects to FULL.
    </div>

    <div class="drag-top">

        <div class="drag-item" draggable="true" data-type="empty">
            <img src="assets/basketempty.png">
        </div>

        <div class="drag-item" draggable="true" data-type="full">
            <img src="assets/basketfulltomato.png">
        </div>

        <div class="drag-item" draggable="true" data-type="empty">
            <img src="assets/cartempty.png">
        </div>

        <div class="drag-item" draggable="true" data-type="full">
            <img src="assets/cartfull.png">
        </div>

        <div class="drag-item" draggable="true" data-type="empty">
            <img src="assets/chestempty.png">
        </div>

        <div class="drag-item" draggable="true" data-type="full">
            <img src="assets/chestfull.png">
        </div>

        <div class="drag-item" draggable="true" data-type="empty">
            <img src="assets/nestempty.png">
        </div>

        <div class="drag-item" draggable="true" data-type="full">
            <img src="assets/nestfull.png">
        </div>

    </div>

    <div class="drop-area">

        <div class="drop-zone" data-zone="empty">
            <img src="assets/empty.png">
            <h2>EMPTY</h2>
        </div>

        <div class="drop-zone" data-zone="full">
            <img src="assets/full.png">
            <h2>FULL</h2>
        </div>

    </div>

</div>

<!-- FINISH -->

<div class="screen" id="finishScreen">

    <h1>Wonderful Job!</h1>

    <button class="playAgain" onclick="location.reload()">
        Play Again
    </button>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

const round1Voice = "Tap all the objects which are full.";
const round2Voice = "Tap all the objects which are empty.";
const round3Voice = "Drag empty objects to empty and full objects to full.";

let currentRound = 1;

/* START */

setTimeout(()=>{

    document.getElementById("logoScreen").classList.remove("active");

    document.getElementById("round1").classList.add("active");

    speak(round1Voice);

},5000);

/* SPEECH */

function speak(text){

    if('speechSynthesis' in window){

        speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);

        utter.rate = 0.9;
        utter.pitch = 1;

        speechSynthesis.speak(utter);
    }
}

/* ROUND 1 + ROUND 2 */

function setupTapRound(className, correctAnswer, nextRound){

    const cards = document.querySelectorAll("." + className);

    const correctCards = [...cards].filter(card => card.dataset.answer === correctAnswer);

    let correctTapped = 0;

    cards.forEach(card=>{

        card.addEventListener("click", ()=>{

            if(card.classList.contains("done")) return;

            if(card.dataset.answer === correctAnswer){

                card.classList.add("correct","done");

                correctSound.currentTime = 0;
                correctSound.play();

                correctTapped++;

                if(correctTapped === correctCards.length){

                    setTimeout(()=>{

                        document.getElementById("round"+currentRound).classList.remove("active");

                        currentRound = nextRound;

                        document.getElementById("round"+currentRound).classList.add("active");

                        if(currentRound === 2){
                            speak(round2Voice);
                        }

                        if(currentRound === 3){
                            speak(round3Voice);
                        }

                    },1000);
                }

            }else{

                card.classList.add("wrong");

                wrongSound.currentTime = 0;
                wrongSound.play();

                setTimeout(()=>{
                    card.classList.remove("wrong");
                },700);
            }

        });

    });

}

setupTapRound("r1","full",2);

setupTapRound("r2","empty",3);

/* DRAG DROP */

let dragged = null;
let placedCount = 0;

document.querySelectorAll(".drag-item").forEach(item=>{

    item.addEventListener("dragstart", ()=>{
        dragged = item;
    });

    item.addEventListener("touchstart", ()=>{
        dragged = item;
    });

});

document.querySelectorAll(".drop-zone").forEach(zone=>{

    zone.addEventListener("dragover",(e)=>{
        e.preventDefault();
    });

    zone.addEventListener("drop",(e)=>{
        e.preventDefault();
        dropItem(zone);
    });

    zone.addEventListener("touchend",()=>{
        dropItem(zone);
    });

});

function dropItem(zone){

    if(!dragged) return;

    const itemType = dragged.dataset.type;
    const zoneType = zone.dataset.zone;

    if(itemType === zoneType){

        correctSound.currentTime = 0;
        correctSound.play();

        zone.appendChild(dragged);

        dragged.style.width = "65px";

        placedCount++;

        if(placedCount === 8){

            setTimeout(()=>{
                finishGame();
            },1000);
        }

    }else{

        wrongSound.currentTime = 0;
        wrongSound.play();
    }

    dragged = null;
}

/* FINISH */

function finishGame(){

    document.getElementById("round3").classList.remove("active");

    document.getElementById("finishScreen").classList.add("active");

    createConfetti();
}

function createConfetti(){

    for(let i=0;i<120;i++){

        const c = document.createElement("div");

        c.classList.add("confetti");

        c.style.left = Math.random()*100 + "vw";

        c.style.background =
        ["#F4A261","#2A9D8F","#E76F51","#E9C46A","#90CAF9"]
        [Math.floor(Math.random()*5)];

        c.style.animationDuration = (Math.random()*3 + 2) + "s";

        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
