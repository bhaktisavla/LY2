<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Full and Empty Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:Arial,sans-serif;
background:#FFF7EC;
overflow:hidden;
}

#game{
width:100vw;
height:100vh;
overflow:hidden;
position:relative;
}

/* SCREENS */

.screen{
display:none;
flex-direction:column;
width:100%;
height:100%;
padding:8px;
}

.active{
display:flex;
}

/* LOGO */

#logoScreen{
justify-content:center;
align-items:center;
background:#FFF1DD;
}

#logoScreen img{
width:240px;
max-width:75%;
}

/* TOP BAR */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.round{
background:#F4A261;
color:white;
padding:8px 14px;
border-radius:12px;
font-weight:bold;
font-size:16px;
}

.speakerBtn{
width:50px;
height:50px;
border:none;
border-radius:50%;
background:#5DBB9A;
color:white;
font-size:22px;
}

/* QUESTION */

.question{
text-align:center;
font-size:20px;
font-weight:bold;
color:#5A4331;
margin-bottom:10px;
line-height:1.3;
}

/* ROUND 1 + 2 */

.grid{
flex:1;
display:grid;
gap:8px;
justify-items:center;
align-items:center;
}

.round1Grid{
grid-template-columns:1fr 1fr;
}

.round2Grid{
grid-template-columns:repeat(3,1fr);
}

.card{
width:100%;
max-width:180px;
background:white;
border-radius:16px;
padding:6px;
border:4px solid transparent;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card img{
width:100%;
height:90px;
object-fit:contain;
}

.correct{
border-color:#6BCB77;
background:#EFFAF1;
}

.wrong{
border-color:#E76F51;
background:#FFF1EC;
}

/* ROUND 3 */

#round3{
justify-content:flex-start;
}

.dragContainer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
margin-bottom:6px;
}

.dragItem{
background:white;
border-radius:10px;
padding:3px;
box-shadow:0 2px 5px rgba(0,0,0,0.12);
touch-action:none;
cursor:grab;
}

.dragItem img{
width:100%;
height:40px;
object-fit:contain;
pointer-events:none;
}

.dropArea{
display:flex;
gap:6px;
flex:1;
min-height:0;
}

.dropZone{
flex:1;
background:white;
border:3px dashed #C6AF89;
border-radius:14px;
padding:4px;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

.dropZone img{
width:36px;
margin-bottom:3px;
}

.dropZone h2{
font-size:15px;
margin-bottom:4px;
color:#5A4331;
}

.dropItems{
width:100%;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:2px;
}

.dropItems .dragItem{
margin:0;
}

/* FINISH */

#finishScreen{
justify-content:center;
align-items:center;
background:#FFF2D8;
}

#finishScreen h1{
font-size:38px;
margin-bottom:20px;
color:#5A4331;
text-align:center;
}

.playAgain{
border:none;
background:#F4A261;
color:white;
padding:16px 28px;
font-size:22px;
border-radius:18px;
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

/* MOBILE */

@media(max-width:768px){

.question{
font-size:17px;
margin-bottom:6px;
}

.card{
max-width:110px;
}

.card img{
height:62px;
}

.round2Grid{
gap:4px;
}

.dragContainer{
gap:3px;
}

.dragItem img{
height:26px;
}

.dropZone{
padding:3px;
}

.dropZone img{
width:28px;
}

.dropZone h2{
font-size:13px;
}

}

/* LAPTOP */

@media(min-width:769px){

.dragItem img{
height:55px;
}

.dropZone{
min-height:180px;
}

.dropZone img{
width:46px;
}

.dropZone h2{
font-size:20px;
}

}

</style>
</head>

<body>

<div id="game">

<!-- LOGO -->

<div class="screen active" id="logoScreen">
<img src="assets/innovine-logo.png">
</div>

<!-- ROUND 1 -->

<div class="screen" id="round1">

<div class="topBar">

<div class="round">
Round 1
</div>

<button class="speakerBtn" onclick="speak(round1Voice)">
🔊
</button>

</div>

<div class="question">
Tap all the objects which are FULL.
</div>

<div class="grid round1Grid">

<div class="card r1" data-correct="false">
<img src="assets/emptyvessel.png">
</div>

<div class="card r1" data-correct="true">
<img src="assets/fullbin.png">
</div>

<div class="card r1" data-correct="false">
<img src="assets/emptybin.png">
</div>

<div class="card r1" data-correct="true">
<img src="assets/fullvessel.png">
</div>

</div>

</div>

<!-- ROUND 2 -->

<div class="screen" id="round2">

<div class="topBar">

<div class="round">
Round 2
</div>

<button class="speakerBtn" onclick="speak(round2Voice)">
🔊
</button>

</div>

<div class="question">
Tap all the objects which are EMPTY.
</div>

<div class="grid round2Grid">

<div class="card r2" data-correct="false">
<img src="assets/fullpopcorn.png">
</div>

<div class="card r2" data-correct="true">
<img src="assets/emptypopcorn.png">
</div>

<div class="card r2" data-correct="true">
<img src="assets/nestempty.png">
</div>

<div class="card r2" data-correct="false">
<img src="assets/nestfull.png">
</div>

<div class="card r2" data-correct="false">
<img src="assets/fullfries.png">
</div>

<div class="card r2" data-correct="true">
<img src="assets/emptyfries.png">
</div>

</div>

</div>

<!-- ROUND 3 -->

<div class="screen" id="round3">

<div class="topBar">

<div class="round">
Round 3
</div>

<button class="speakerBtn" onclick="speak(round3Voice)">
🔊
</button>

</div>

<div class="question">
Drag EMPTY objects to EMPTY and FULL objects to FULL.
</div>

<div class="dragContainer">

<div class="dragItem" draggable="true" data-type="empty">
<img src="assets/basketempty.png">
</div>

<div class="dragItem" draggable="true" data-type="full">
<img src="assets/basketfulltomato.png">
</div>

<div class="dragItem" draggable="true" data-type="full">
<img src="assets/cartfull.png">
</div>

<div class="dragItem" draggable="true" data-type="empty">
<img src="assets/cartempty.png">
</div>

<div class="dragItem" draggable="true" data-type="empty">
<img src="assets/nestempty.png">
</div>

<div class="dragItem" draggable="true" data-type="full">
<img src="assets/nestfull.png">
</div>

<div class="dragItem" draggable="true" data-type="empty">
<img src="assets/chestempty.png">
</div>

<div class="dragItem" draggable="true" data-type="full">
<img src="assets/chestfull.png">
</div>

</div>

<div class="dropArea">

<div class="dropZone" data-zone="empty">

<img src="assets/empty.png">

<h2>EMPTY</h2>

<div class="dropItems"></div>

</div>

<div class="dropZone" data-zone="full">

<img src="assets/full.png">

<h2>FULL</h2>

<div class="dropItems"></div>

</div>

</div>

</div>

<!-- FINISH -->

<div class="screen" id="finishScreen">

<h1>
Wonderful Job!
</h1>

<button class="playAgain" onclick="location.reload()">
Play Again
</button>

</div>

</div>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* VOICE */

const round1Voice =
"Tap all the objects which are full.";

const round2Voice =
"Tap all the objects which are empty.";

const round3Voice =
"Drag empty objects to empty and full objects to full.";

/* AUDIO */

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* START */

setTimeout(()=>{

document.getElementById("logoScreen")
.classList.remove("active");

document.getElementById("round1")
.classList.add("active");

speak(round1Voice);

},5000);

/* SPEECH */

function speak(text){

if("speechSynthesis" in window){

speechSynthesis.cancel();

let speech =
new SpeechSynthesisUtterance(text);

speech.rate = 0.9;

speechSynthesis.speak(speech);

}

}

/* ROUND 1 */

let round1Correct = 0;

document.querySelectorAll(".r1").forEach(card=>{

card.addEventListener("click",()=>{

if(card.classList.contains("done")) return;

if(card.dataset.correct === "true"){

card.classList.add("correct","done");

round1Correct++;

if(round1Correct === 2){

correctSound.play();

setTimeout(()=>{

document.getElementById("round1")
.classList.remove("active");

document.getElementById("round2")
.classList.add("active");

speak(round2Voice);

},1200);

}

}else{

wrongSound.play();

card.classList.add("wrong");

setTimeout(()=>{
card.classList.remove("wrong");
},600);

}

});

});

/* ROUND 2 */

let round2Correct = 0;

document.querySelectorAll(".r2").forEach(card=>{

card.addEventListener("click",()=>{

if(card.classList.contains("done")) return;

if(card.dataset.correct === "true"){

card.classList.add("correct","done");

round2Correct++;

if(round2Correct === 3){

correctSound.play();

setTimeout(()=>{

document.getElementById("round2")
.classList.remove("active");

document.getElementById("round3")
.classList.add("active");

speak(round3Voice);

},1200);

}

}else{

wrongSound.play();

card.classList.add("wrong");

setTimeout(()=>{
card.classList.remove("wrong");
},600);

}

});

});

/* ROUND 3 */

/* WORKS ON BOTH LAPTOP + MOBILE */

let draggedItem = null;
let placed = 0;

const dragItems =
document.querySelectorAll(".dragItem");

const dropZones =
document.querySelectorAll(".dropZone");

/* DESKTOP */

dragItems.forEach(item=>{

item.addEventListener("dragstart",()=>{

draggedItem = item;

});

});

dropZones.forEach(zone=>{

zone.addEventListener("dragover",(e)=>{

e.preventDefault();

});

zone.addEventListener("drop",(e)=>{

e.preventDefault();

if(!draggedItem) return;

checkDrop(zone,draggedItem);

});

});

/* MOBILE */

dragItems.forEach(item=>{

let currentX = 0;
let currentY = 0;

item.addEventListener("touchstart",(e)=>{

draggedItem = item;

item.style.position = "fixed";
item.style.zIndex = "9999";
item.style.pointerEvents = "none";

});

item.addEventListener("touchmove",(e)=>{

if(!draggedItem) return;

const touch = e.touches[0];

currentX = touch.clientX;
currentY = touch.clientY;

item.style.left =
(currentX - item.offsetWidth/2)+"px";

item.style.top =
(currentY - item.offsetHeight/2)+"px";

});

item.addEventListener("touchend",()=>{

if(!draggedItem) return;

let dropped = false;

dropZones.forEach(zone=>{

const rect =
zone.getBoundingClientRect();

if(
currentX > rect.left &&
currentX < rect.right &&
currentY > rect.top &&
currentY < rect.bottom
){

checkDrop(zone,item);

dropped = true;

}

});

if(!dropped){

resetItem(item);

}

draggedItem = null;

});

});

/* CHECK DROP */

function checkDrop(zone,item){

const itemType =
item.dataset.type;

const zoneType =
zone.dataset.zone;

if(itemType === zoneType){

zone.querySelector(".dropItems")
.appendChild(item);

item.style.position = "relative";
item.style.left = "0";
item.style.top = "0";
item.style.pointerEvents = "none";

placed++;

if(placed === 8){

correctSound.play();

setTimeout(()=>{

finishGame();

},1500);

}

}else{

wrongSound.play();

resetItem(item);

}

}

/* RESET */

function resetItem(item){

item.style.position = "relative";
item.style.left = "0";
item.style.top = "0";
item.style.zIndex = "1";
item.style.pointerEvents = "auto";

}

/* FINISH */

function finishGame(){

document.getElementById("round3")
.classList.remove("active");

document.getElementById("finishScreen")
.classList.add("active");

createConfetti();

}

/* CONFETTI */

function createConfetti(){

for(let i=0;i<120;i++){

const confetti =
document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left =
Math.random()*100+"vw";

confetti.style.background =
["#F4A261","#2A9D8F","#E9C46A","#90CAF9","#E76F51"]
[Math.floor(Math.random()*5)];

confetti.style.animationDuration =
(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

}

}

</script>

</body>
</html>
