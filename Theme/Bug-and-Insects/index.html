<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Bugs and Insects</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

body{
background:url('assets/backdrop.jpg') center center/cover no-repeat;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:10px;
}

.hidden{
display:none;
}

/* Splash */
#logoScreen img{
width:min(70vw,350px);
max-height:50vh;
object-fit:contain;
}

#titleScreen{
text-align:center;
}

#titleScreen h1{
font-size:clamp(2rem,6vw,4rem);
color:#ff6b6b;
text-shadow:2px 2px 4px rgba(0,0,0,.2);
animation:pulse 1.5s infinite;
}

/* Game */

.game-container{
width:100%;
height:100%;
display:flex;
flex-direction:column;
padding:10px;
}

.header{
text-align:center;
padding:5px;
}

.header h1{
font-size:clamp(1.5rem,4vw,2.5rem);
color:#ff7043;
margin-bottom:6px;
}

.question-row{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.question{
font-size:clamp(1rem,2.5vw,1.5rem);
font-weight:bold;
color:#3949ab;
}

.listen-btn{
border:none;
background:#ffd54f;
padding:8px 14px;
border-radius:12px;
font-size:1rem;
cursor:pointer;
font-weight:bold;
}

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
align-content:center;
max-width:1200px;
margin:auto;
width:100%;
}

.card{
background:rgba(255,255,255,0.92);
border:4px solid transparent;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.2s;
overflow:hidden;
aspect-ratio:1/1;
}

.card img{
width:92%;
height:92%;
object-fit:contain;
pointer-events:none;
}

.correct{
border:8px solid #22c55e;
}

.shake{
animation:shake .4s;
}

.glow{
animation:glow 1s infinite;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-5px);}
75%{transform:translateX(5px);}
}

@keyframes glow{
0%{box-shadow:0 0 5px gold;}
50%{box-shadow:0 0 25px gold;}
100%{box-shadow:0 0 5px gold;}
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

/* Finish */

#finishScreen{
text-align:center;
}

#finishTitle{
font-size:clamp(2rem,6vw,4rem);
font-weight:bold;
background:linear-gradient(90deg,#ff6b6b,#ffb74d,#66bb6a,#42a5f5,#ab47bc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.play-again{
border:none;
background:#42a5f5;
color:white;
padding:14px 24px;
font-size:1.2rem;
border-radius:15px;
cursor:pointer;
font-weight:bold;
}

/* Confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(5,1fr);
gap:8px;
}
}

@media(max-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

</style>
</head>
<body>

<!-- Logo -->
<div id="logoScreen" class="screen">
<img src="assets/innovine-logo.png" alt="">
</div>

<!-- Title -->
<div id="titleScreen" class="screen hidden">
<h1>Bugs and Insects</h1>
</div>

<!-- Game -->
<div id="gameScreen" class="hidden">
<div class="game-container">

<div class="header">
<h1>Bugs and Insects</h1>

<div class="question-row">
<div class="question">
Look carefully and tap on all the insects.
</div>

<button class="listen-btn" onclick="speakQuestion()">
🔊 Hear Again
</button>
</div>
</div>

<div id="grid" class="grid"></div>

</div>
</div>

<!-- Finish -->
<div id="finishScreen" class="screen hidden">
<div id="finishTitle">🌟 Great Job! 🌟</div>
<button class="play-again" onclick="location.reload()">
Play Again
</button>
</div>

<audio id="clapSound" src="assets/clap.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const allImages = [
{file:'ant.png', insect:true},
{file:'bear.png', insect:false},
{file:'butterfly.png', insect:true},
{file:'cow.png', insect:false},
{file:'dragonfly.png', insect:true},
{file:'fly.png', insect:true},
{file:'grasshopper.png', insect:true},
{file:'honeybee.png', insect:true},
{file:'monkey.png', insect:false},
{file:'mosquito.png', insect:true}
];

const totalCorrect = 7;

let correctFound = 0;
let wrongAttempts = 0;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function speakQuestion(){

speechSynthesis.cancel();

const utterance = new SpeechSynthesisUtterance(
"Look carefully and tap on all the insects."
);

utterance.rate = 0.9;
utterance.pitch = 1;
speechSynthesis.speak(utterance);
}

function createGame(){

const grid = document.getElementById("grid");

shuffle(allImages).forEach(item=>{

const card = document.createElement("div");
card.className = "card";

const img = document.createElement("img");
img.src = "assets/" + item.file;

card.appendChild(img);

card.onclick = ()=>{

if(card.classList.contains("correct")) return;

if(item.insect){

card.classList.add("correct");
correctFound++;

if(correctFound === totalCorrect){
finishGame();
}

}else{

wrongAttempts++;

document.getElementById("wrongSound").play();

card.classList.add("shake");

setTimeout(()=>{
card.classList.remove("shake");
},400);

if(wrongAttempts >= 2){

document.querySelectorAll(".card").forEach((c,index)=>{

const data = document.querySelectorAll(".card img")[index].src;

if(
(data.includes("ant.png") ||
data.includes("butterfly.png") ||
data.includes("dragonfly.png") ||
data.includes("fly.png") ||
data.includes("grasshopper.png") ||
data.includes("honeybee.png") ||
data.includes("mosquito.png"))
&& !c.classList.contains("correct")
){
c.classList.add("glow");
}
});
}
}
};

grid.appendChild(card);

});
}

function finishGame(){

speechSynthesis.cancel();

document.getElementById("clapSound").play();

setTimeout(()=>{
const msg = new SpeechSynthesisUtterance("Good Job!");
speechSynthesis.speak(msg);
},300);

document.getElementById("gameScreen").classList.add("hidden");
document.getElementById("finishScreen").classList.remove("hidden");

createConfetti();
}

function createConfetti(){

const colors = [
'#ff6b6b',
'#ffd54f',
'#66bb6a',
'#42a5f5',
'#ab47bc',
'#ff8a65'
];

for(let i=0;i<120;i++){

const confetti = document.createElement("div");
confetti.className = "confetti";

confetti.style.left = Math.random()*100 + "vw";
confetti.style.background =
colors[Math.floor(Math.random()*colors.length)];

confetti.style.animationDuration =
(3 + Math.random()*3) + "s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},7000);
}
}

/* Splash Sequence */

setTimeout(()=>{
document.getElementById("logoScreen").classList.add("hidden");
document.getElementById("titleScreen").classList.remove("hidden");
},5000);

setTimeout(()=>{
document.getElementById("titleScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

createGame();

setTimeout(()=>{
speakQuestion();
},500);

},10000);

</script>

</body>
</html>
