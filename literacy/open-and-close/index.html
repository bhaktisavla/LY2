<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Open and Close Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#dff6ff;
}

/* MAIN GAME */
#gameContainer{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
    180deg,
    #b8ecff 0%,
    #d9f7ff 35%,
    #fff4c2 100%);
}

/* DECORATIVE CIRCLES */
#gameContainer::before,
#gameContainer::after{
    content:"";
    position:absolute;
    border-radius:50%;
    opacity:0.28;
    z-index:0;
}

#gameContainer::before{
    width:320px;
    height:320px;
    background:#ffb3c7;
    top:-90px;
    left:-90px;
}

#gameContainer::after{
    width:260px;
    height:260px;
    background:#ffe08a;
    bottom:-70px;
    right:-70px;
}

/* LOGO SCREEN */
#logoScreen{
    position:absolute;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#logoScreen img{
    width:min(320px,70vw);
}

/* HEADER */
.header{
    width:100%;
    text-align:center;
    padding:8px 5px 2px;
    position:relative;
    z-index:2;
}

.header h1{
    font-size:clamp(30px,5vw,48px);
    color:#ff5d73;
    text-shadow:2px 2px white;
}

.instruction{
    margin-top:4px;
    font-size:clamp(16px,2.5vw,24px);
    font-weight:bold;
    color:#4b4bff;
}

/* QUESTION BOX */
#questionBox{
    width:95%;
    max-width:1000px;
    margin:5px auto 0;
    padding:10px;

    background:rgba(255,255,255,0.9);

    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    box-shadow:0 4px 10px rgba(0,0,0,0.15);

    position:relative;
    z-index:2;
}

#questionText{
    font-size:clamp(22px,3vw,38px);
    font-weight:bold;
    text-align:center;
}

.color1{color:#ff4d6d;}
.color2{color:#ff9800;}
.color3{color:#00a86b;}
.color4{color:#0077ff;}

#speakBtn{
    border:none;
    background:#ffd166;
    border-radius:50%;
    width:55px;
    height:55px;
    font-size:26px;
    cursor:pointer;
}

/* ROUND */
#round{
    margin-top:5px;
    font-size:clamp(16px,2vw,24px);
    font-weight:bold;
    color:#5b3a29;
    position:relative;
    z-index:2;
    text-align:center;
}

/* OPTIONS */
#options{
    width:100%;
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:18px;

    padding:10px;

    position:relative;
    z-index:2;
}

.option{
    width:45%;
    max-width:420px;
    height:58vh;

    background:rgba(255,255,255,0.92);

    border-radius:24px;

    display:flex;
    justify-content:center;
    align-items:center;

    border:5px solid transparent;

    transition:0.25s;

    cursor:pointer;

    position:relative;
}

.option img{
    width:96%;
    height:96%;
    object-fit:contain;
}

/* CORRECT */
.correct{
    border-color:#2ecc71;
    animation:pop 0.5s;
}

/* WRONG */
.wrong{
    animation:shake 0.35s;
}

/* GLOW */
.glow{
    animation:glow 1s infinite;
}

/* FEEDBACK */
#feedback{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(40px,7vw,90px);
    font-weight:bold;
    color:#2ecc71;
    text-shadow:2px 2px white;
    display:none;
    z-index:20;
    text-align:center;
}

/* PLAY AGAIN */
#playAgain{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    display:none;

    padding:16px 34px;

    border:none;
    border-radius:18px;

    background:#ffb703;

    color:white;

    font-size:clamp(22px,3vw,30px);
    font-weight:bold;

    cursor:pointer;

    z-index:25;
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:12px;
    height:12px;
    top:-20px;
    animation:fall linear forwards;
}

/* ANIMATIONS */

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);}
    75%{transform:translateX(-8px);}
    100%{transform:translateX(0);}
}

@keyframes glow{
    0%{box-shadow:0 0 5px #2ecc71;}
    50%{box-shadow:0 0 25px #2ecc71;}
    100%{box-shadow:0 0 5px #2ecc71;}
}

@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

/* MOBILE */
@media(max-width:768px){

    #options{
        gap:10px;
        padding:5px;
    }

    .option{
        width:48%;
        height:52vh;
    }

    #questionBox{
        padding:8px;
    }

    #speakBtn{
        width:48px;
        height:48px;
        font-size:22px;
    }
}

</style>
</head>

<body>

<div id="gameContainer">

    <!-- LOGO -->
    <div id="logoScreen">
        <img src="assets/innovine-logo.png" alt="Logo">
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1>Open and Close</h1>

        <div class="instruction">
            Listen and click to the correct picture.
        </div>
    </div>

    <!-- QUESTION -->
    <div id="questionBox">

        <div id="questionText"></div>

        <button id="speakBtn">
            🔊
        </button>

    </div>

    <!-- ROUND -->
    <div id="round"></div>

    <!-- OPTIONS -->
    <div id="options">

        <div class="option" id="option1">
            <img id="img1" src="">
        </div>

        <div class="option" id="option2">
            <img id="img2" src="">
        </div>

    </div>

    <!-- FEEDBACK -->
    <div id="feedback"></div>

    <!-- PLAY AGAIN -->
    <button id="playAgain">
        Play Again
    </button>

</div>

<!-- AUDIO -->
<audio id="rightSound" src="assets/right.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* QUESTIONS */

const rounds = [

{
question:"Click the open box.",
voice:"Click the open box.",
images:[
"assets/openbox.png",
"assets/closebox.png"
],
correct:0
},

{
question:"Click the closed door.",
voice:"Click the closed door.",
images:[
"assets/opendoor.png",
"assets/closedoor.png"
],
correct:1
},

{
question:"Click the open umbrella.",
voice:"Click the open umbrella.",
images:[
"assets/openumbrella.png",
"assets/closeumbrella.png"
],
correct:0
},

{
question:"Click the open book.",
voice:"Click the open book.",
images:[
"assets/openbook.png",
"assets/closebook.png"
],
correct:0
},

{
question:"Click the closed window.",
voice:"Click the closed window.",
images:[
"assets/openwindow.png",
"assets/closewindow.png"
],
correct:1
},

{
question:"Click the closed lid.",
voice:"Click the closed lid.",
images:[
"assets/openlid.png",
"assets/closelid.png"
],
correct:1
},

{
question:"Click the open chest.",
voice:"Click the open chest.",
images:[
"assets/openchest.png",
"assets/closechest.png"
],
correct:0
},

{
question:"Click the closed cupboard.",
voice:"Click the closed cupboard.",
images:[
"assets/opencupboard.png",
"assets/closecupboard.png"
],
correct:1
}

];

let currentRound = 0;
let wrongAttempts = 0;

const questionText = document.getElementById("questionText");

const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");

const option1 = document.getElementById("option1");
const option2 = document.getElementById("option2");

const feedback = document.getElementById("feedback");

const roundText = document.getElementById("round");

const playAgainBtn = document.getElementById("playAgain");

const rightSound = document.getElementById("rightSound");
const wrongSound = document.getElementById("wrongSound");

const colors = [
"color1",
"color2",
"color3",
"color4"
];

/* RANDOM QUESTION COLOR */

function randomColorClass(){

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

/* LOAD ROUND */

function loadRound(){

    wrongAttempts = 0;

    option1.classList.remove("glow");
    option2.classList.remove("glow");

    const round = rounds[currentRound];

    questionText.className = "";

    questionText.classList.add(
    randomColorClass()
    );

    questionText.textContent =
    round.question;

    img1.src = round.images[0];
    img2.src = round.images[1];

    roundText.textContent =
    `Round ${currentRound+1} / 8`;

    speak(round.voice);
}

/* SPEECH */

function speak(text){

    speechSynthesis.cancel();

    const utterance =
    new SpeechSynthesisUtterance(text);

    utterance.rate = 0.9;
    utterance.pitch = 1;
    utterance.volume = 1;

    speechSynthesis.speak(utterance);
}

/* SPEAK AGAIN BUTTON */

document.getElementById("speakBtn")
.addEventListener("click", ()=>{

    speak(rounds[currentRound].voice);

});

/* HANDLE ANSWER */

function handleAnswer(selected){

    const correct =
    rounds[currentRound].correct;

    if(selected === correct){

        rightSound.currentTime = 0;
        rightSound.play();

        if(correct === 0){

            option1.classList.add("correct");

        }else{

            option2.classList.add("correct");
        }

        feedback.style.display = "block";

        feedback.innerHTML = "✔ Good Job!";

        setTimeout(()=>{

            feedback.style.display = "none";

            option1.classList.remove("correct");
            option2.classList.remove("correct");

            currentRound++;

            if(currentRound < rounds.length){

                loadRound();

            }else{

                endGame();
            }

        },1700);

    }else{

        wrongSound.currentTime = 0;
        wrongSound.play();

        wrongAttempts++;

        if(selected===0){

            option1.classList.add("wrong");

            setTimeout(()=>{
                option1.classList.remove("wrong");
            },400);

        }else{

            option2.classList.add("wrong");

            setTimeout(()=>{
                option2.classList.remove("wrong");
            },400);
        }

        /* GLOW AFTER 2 WRONG ATTEMPTS */

        if(wrongAttempts >= 2){

            if(correct===0){

                option1.classList.add("glow");

            }else{

                option2.classList.add("glow");
            }
        }
    }
}

/* CLICK EVENTS */

option1.addEventListener(
"click",
()=>handleAnswer(0)
);

option2.addEventListener(
"click",
()=>handleAnswer(1)
);

/* END GAME */

function endGame(){

    /* HIDE HEADER */
    document.querySelector(".header")
    .style.display = "none";

    document.getElementById("questionBox")
    .style.display = "none";

    roundText.style.display = "none";

    /* HIDE OPTIONS */
    document.getElementById("options")
    .style.display = "none";

    /* SHOW FEEDBACK */
    feedback.style.display = "block";

    feedback.innerHTML =
    "🎉 Amazing! 🎉";

    createConfetti();

    /* SHOW PLAY AGAIN */
    playAgainBtn.style.display = "block";

    speak(
    "Amazing! You completed the game!"
    );
}

/* PLAY AGAIN */

playAgainBtn.addEventListener(
"click",
()=>{

    currentRound = 0;

    /* SHOW AGAIN */
    document.querySelector(".header")
    .style.display = "block";

    document.getElementById("questionBox")
    .style.display = "flex";

    roundText.style.display = "block";

    document.getElementById("options")
    .style.display = "flex";

    feedback.style.display = "none";

    playAgainBtn.style.display = "none";

    loadRound();
});

/* CONFETTI */

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.background =
        `hsl(${Math.random()*360},
        90%,60%)`;

        confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s";

        confetti.style.width =
        confetti.style.height =
        (Math.random()*10 + 6) + "px";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

/* START GAME AFTER 5 SECONDS */

setTimeout(()=>{

    document.getElementById("logoScreen")
    .style.display = "none";

    loadRound();

},5000);

</script>

</body>
</html>
