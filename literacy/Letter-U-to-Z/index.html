<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Letters U to Z</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:url('assets/colorful-background.jpg') center/cover no-repeat;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('assets/colorful-background.jpg') center/cover no-repeat;
}

.hidden{
display:none;
}

#logoScreen img{
width:min(70vw,400px);
animation:pulse 1.8s infinite;
}

#titleScreen h1{
font-size:clamp(2rem,6vw,4rem);
color:#ff6b6b;
animation:flashTitle 1s infinite;
text-align:center;
}

@keyframes flashTitle{
0%,100%{opacity:1}
50%{opacity:.3}
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.08)}
}

#gameScreen{
padding:10px;
}

.game-card{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
}

.header{
width:100%;
text-align:center;
padding:6px;
}

.header h1{
font-size:clamp(24px,4vw,40px);
color:#7b2cbf;
margin-bottom:5px;
}

.question-row{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
}

.question{
font-size:clamp(18px,2.8vw,30px);
font-weight:bold;
color:#ff7f11;
text-align:center;
}

.speaker-btn{
border:none;
background:#fff;
font-size:28px;
padding:8px;
border-radius:50%;
cursor:pointer;
}

.content{
flex:1;
width:100%;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.identify-layout{
display:flex;
width:100%;
height:100%;
gap:10px;
align-items:center;
}

.letter-panel{
width:20%;
display:flex;
justify-content:center;
align-items:center;
}

.letter-panel img{
max-width:90%;
max-height:70vh;
object-fit:contain;
}

.options-panel{
width:80%;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:5px;
}

.option{
background:white;
border-radius:18px;
border:4px solid transparent;
padding:5px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
transition:.2s;
}

.option img{
width:100%;
height:120px;
object-fit:contain;
}

.correct{
border:6px solid #2dc653 !important;
}

.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 0px yellow}
50%{box-shadow:0 0 25px yellow}
100%{box-shadow:0 0 0px yellow}
}

.wiggle{
animation:wiggle .4s;
}

@keyframes wiggle{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.message{
font-size:clamp(24px,4vw,48px);
font-weight:bold;
color:#ff006e;
animation:pulse 1s infinite;
}

.trace-layout{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
}

.trace-wrapper{
position:relative;
width:min(90vw,700px);
height:min(60vh,500px);
}

.trace-image{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
pointer-events:none;
}

#traceCanvas{
position:absolute;
inset:0;
touch-action:none;
}

.trace-controls{
display:flex;
gap:20px;
}

.control-btn{
border:none;
background:white;
padding:12px 20px;
border-radius:16px;
font-size:22px;
cursor:pointer;
}

#confettiCanvas{
position:absolute;
inset:0;
pointer-events:none;
}

#finishScreen h1{
font-size:clamp(40px,7vw,80px);
color:#ff006e;
margin-bottom:20px;
}

.play-again{
padding:15px 35px;
font-size:28px;
border:none;
border-radius:18px;
cursor:pointer;
background:#ffd60a;
}

@media(max-width:768px){

.options-panel{
grid-template-columns:repeat(2,1fr);
}

.option img{
height:90px;
}

.letter-panel{
width:25%;
}

.options-panel{
width:75%;
}
}

</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div id="logoScreen" class="screen">
<img src="assets/innovine-logo.png">
</div>

<div id="titleScreen" class="screen hidden">
<h1>Letters U to Z</h1>
</div>

<div id="gameScreen" class="screen hidden">

<div class="game-card">

<div class="header">

<h1 id="roundTitle">Letters U to Z</h1>

<div class="question-row">

<div id="questionText" class="question"></div>

<button class="speaker-btn"
onclick="speakQuestion()">🔊</button>

</div>

</div>

<div id="contentArea" class="content"></div>

</div>

</div>

<div id="finishScreen"
class="screen hidden">

<h1>Great Job!</h1>

<button class="play-again"
onclick="location.reload()">
Play Again
</button>

</div>

<audio id="clapAudio"
src="assets/clap.mp3"
preload="auto"></audio>

<audio id="wrongAudio"
src="assets/wrong.mp3"
preload="auto"></audio>

<script>

let currentRound=0;

let selectedCorrect=0;
let wrongAttempts=0;

let currentQuestion="";

let hasTraced=false;
let autoMoveTimer=null;

const clapAudio=
document.getElementById("clapAudio");

const wrongAudio=
document.getElementById("wrongAudio");

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=
[array[j],array[i]];
}

return array;
}

function speakQuestion(){

speechSynthesis.cancel();

const utter=
new SpeechSynthesisUtterance(
currentQuestion
);

utter.rate=.9;
utter.pitch=1.05;

speechSynthesis.speak(utter);
}

function showMessage(text){

const msg=document.createElement("div");

msg.className="message";
msg.innerText=text;

document.body.appendChild(msg);

setTimeout(()=>{
msg.remove();
},1800);
}

function playClap(){
clapAudio.currentTime=0;
clapAudio.play();
}

function playWrong(){
wrongAudio.currentTime=0;
wrongAudio.play();
}

function startGame(){

setTimeout(()=>{

document.getElementById("logoScreen")
.classList.add("hidden");

document.getElementById("titleScreen")
.classList.remove("hidden");

setTimeout(()=>{

document.getElementById("titleScreen")
.classList.add("hidden");

document.getElementById("gameScreen")
.classList.remove("hidden");

loadRound(0);

},5000);

},5000);

}

window.onload=startGame;

/* ==========================
   ROUNDS DATA
========================== */

const rounds = [

/* ROUND 1 */

{
type:"identify",
title:"Letters U to Z",
letter:"assets/U.png",
question:"Look at the letter U. Tap the pictures that start with letter U.",

correct:[
"umbrella.png",
"umpire.png",
"unicorn.png",
"unicycle.png",
"uniform.png",
"utensil.png",
"upset.png"
],

options:[
"umbrella.png",
"umpire.png",
"unicorn.png",
"unicycle.png",
"uniform.png",
"utensil.png",
"upset.png",
"zucchini.png"
]
},

/* ROUND 2 */

{
type:"trace",
title:"Letter U",
question:"Trace letter U.",
trace:"assets/traceU.png"
},

/* ROUND 3 */

{
type:"identify",
title:"Letters U to Z",
letter:"assets/V.png",

question:"Look at the letter V. Tap the pictures that start with letter V.",

correct:[
"vacuumcleaner.png",
"van.png",
"vase.png",
"violin.png",
"vegetable.png",
"volcano.png",
"vulture.png"
],

options:[
"vacuumcleaner.png",
"van.png",
"vase.png",
"violin.png",
"vegetable.png",
"volcano.png",
"vulture.png",
"yoyo.png"
]
},

/* ROUND 4 */

{
type:"trace",
title:"Letter V",
question:"Trace letter V.",
trace:"assets/traceV.png"
},

/* ROUND 5 */

{
type:"identify",
title:"Letters U to Z",
letter:"assets/W.png",

question:"Look at the letter W. Tap the pictures that start with letter W.",

correct:[
"watermelon.png",
"whale.png",
"window.png",
"web.png",
"wheel.png",
"whistle.png",
"watch.png"
],

options:[
"watermelon.png",
"whale.png",
"window.png",
"web.png",
"wheel.png",
"whistle.png",
"watch.png",
"unicycle.png"
]
},

/* ROUND 6 */

{
type:"trace",
title:"Letter W",
question:"Trace letter W.",
trace:"assets/traceW.png"
}

];



/* ==========================
   ROUND LOADER
========================== */

function loadRound(index){

currentRound=index;

selectedCorrect=0;
wrongAttempts=0;

const round=rounds[index];

document.getElementById("roundTitle")
.innerText=round.title;

currentQuestion=round.question;

document.getElementById("questionText")
.innerText=currentQuestion;

setTimeout(()=>{
speakQuestion();
},500);

if(round.type==="identify"){
loadIdentifyRound(round);
}
else{
loadTraceRound(round);
}

}



/* ==========================
 IDENTIFY ENGINE
========================== */

function loadIdentifyRound(round){

const area=
document.getElementById("contentArea");

area.innerHTML="";

const layout=
document.createElement("div");

layout.className="identify-layout";



const letterPanel=
document.createElement("div");

letterPanel.className="letter-panel";

letterPanel.innerHTML=
`<img src="${round.letter}">`;



const optionsPanel=
document.createElement("div");

optionsPanel.className="options-panel";



const shuffled=
shuffle([...round.options]);

shuffled.forEach(image=>{

const card=
document.createElement("div");

card.className="option";

card.dataset.correct=
round.correct.includes(image);

card.dataset.clicked="false";

card.innerHTML=
`<img src="assets/${image}">`;



card.onclick=()=>{

if(card.dataset.clicked==="true")
return;



if(card.dataset.correct==="true"){

card.dataset.clicked="true";

card.classList.add("correct");

selectedCorrect++;



if(
selectedCorrect===
round.correct.length
){

showMessage("Good Job!");

playClap();

setTimeout(()=>{

loadRound(currentRound+1);

},1800);

}

}else{

playWrong();

card.classList.add("wiggle");

setTimeout(()=>{
card.classList.remove("wiggle");
},400);

wrongAttempts++;



if(wrongAttempts>=2){

document
.querySelectorAll(".option")
.forEach(opt=>{

if(
opt.dataset.correct==="true" &&
opt.dataset.clicked==="false"
){
opt.classList.add("glow");
}

});

}

}

};



optionsPanel.appendChild(card);

});



layout.appendChild(letterPanel);
layout.appendChild(optionsPanel);

area.appendChild(layout);

}



/* ==========================
 NEXT ROUND FUNCTION
========================== */

function goToNextRound(){

if(currentRound <
rounds.length-1){

loadRound(currentRound+1);

}
}

/* =====================================
   ADD REMAINING ROUNDS
===================================== */

rounds.push(

/* ROUND 7 */

{
type:"identify",

title:"Letters U to Z",

letter:"assets/X.png",

question:"Look at the letter X. Tap the pictures that start with letter X.",

correct:[
"x-ray.png",
"xmastree.png",
"xylophone.png"
],

options:[
"x-ray.png",
"xmastree.png",
"xylophone.png",
"zebra.png"
]
},

/* ROUND 8 */

{
type:"trace",

title:"Letter X",

question:"Trace letter X.",

trace:"assets/traceX.png"
},

/* ROUND 9 */

{
type:"identify",

title:"Letters U to Z",

letter:"assets/Y.png",

question:"Look at the letter Y. Tap the pictures that start with letter Y.",

correct:[
"yacht.png",
"yam.png",
"yak.png",
"yarn.png",
"yoghurt.png",
"yolk.png",
"yoyo.png"
],

options:[
"yacht.png",
"yam.png",
"yak.png",
"yarn.png",
"yoghurt.png",
"yolk.png",
"yoyo.png",
"vase.png"
]
},

/* ROUND 10 */

{
type:"trace",

title:"Letter Y",

question:"Trace letter Y.",

trace:"assets/traceY.png"
},

/* ROUND 11 */

{
type:"identify",

title:"Letters U to Z",

letter:"assets/Z.png",

question:"Look at the letter Z. Tap the pictures that start with letter Z.",

correct:[
"zoo.png",
"zip.png",
"zero.png",
"zig-zag.png",
"zebra.png",
"zucchini.png"
],

options:[
"zoo.png",
"zip.png",
"zero.png",
"zig-zag.png",
"zebra.png",
"zucchini.png",
"watch.png"
]
},

/* ROUND 12 */

{
type:"trace",

title:"Letter Z",

question:"Trace letter Z.",

trace:"assets/traceZ.png"
}

);

/* =====================================
   TRACE ENGINE
===================================== */

let canvas;
let ctx;

let drawing=false;
let traceStarted=false;

function loadTraceRound(round){

const area=
document.getElementById("contentArea");

area.innerHTML=`

<div class="trace-layout">

<div class="trace-wrapper">

<img
class="trace-image"
src="${round.trace}">

<canvas id="traceCanvas"></canvas>

</div>

<div class="trace-controls">

<button
class="control-btn"
onclick="eraseTrace()">

🧽 Eraser

</button>

<button
class="control-btn"
onclick="traceDone()">

✅ Done

</button>

</div>

</div>

`;

setupCanvas();

}



function setupCanvas(){

canvas=
document.getElementById("traceCanvas");

ctx=
canvas.getContext("2d");

resizeCanvas();

window.addEventListener(
"resize",
resizeCanvas
);

ctx.lineWidth=8;
ctx.lineCap="round";
ctx.strokeStyle="red";



canvas.addEventListener(
"mousedown",
startDraw
);

canvas.addEventListener(
"mousemove",
draw
);

canvas.addEventListener(
"mouseup",
stopDraw
);

canvas.addEventListener(
"mouseleave",
stopDraw
);



canvas.addEventListener(
"touchstart",
startDrawTouch,
{passive:false}
);

canvas.addEventListener(
"touchmove",
drawTouch,
{passive:false}
);

canvas.addEventListener(
"touchend",
stopDraw
);

}



function resizeCanvas(){

const rect=
canvas.parentElement.getBoundingClientRect();

canvas.width=rect.width;
canvas.height=rect.height;

}



function startDraw(e){

drawing=true;
traceStarted=true;

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}



function draw(e){

if(!drawing) return;

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

if(traceStarted){

startAutoAdvance();

traceStarted=false;

}

}



function stopDraw(){

drawing=false;

}



function startDrawTouch(e){

e.preventDefault();

const rect=
canvas.getBoundingClientRect();

const touch=
e.touches[0];

drawing=true;

traceStarted=true;

ctx.beginPath();

ctx.moveTo(
touch.clientX-rect.left,
touch.clientY-rect.top
);

}



function drawTouch(e){

e.preventDefault();

if(!drawing) return;

const rect=
canvas.getBoundingClientRect();

const touch=
e.touches[0];

ctx.lineTo(
touch.clientX-rect.left,
touch.clientY-rect.top
);

ctx.stroke();

if(traceStarted){

startAutoAdvance();

traceStarted=false;

}

}



function eraseTrace(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

clearTimeout(autoMoveTimer);

traceStarted=false;

}



/* =====================================
   TRACE COMPLETE
===================================== */

function traceDone(){

clearTimeout(autoMoveTimer);

playClap();

showMessage("Good Job!");

setTimeout(()=>{

if(currentRound===11){

finishGame();

}else{

goToNextRound();

}

},1500);

}



function startAutoAdvance(){

clearTimeout(autoMoveTimer);

autoMoveTimer=
setTimeout(()=>{

playClap();

showMessage("Good Job!");



if(currentRound===11){

setTimeout(()=>{

finishGame();

},1500);

}else{

setTimeout(()=>{

goToNextRound();

},1500);

}

},4000);

}



/* =====================================
   FINISH SCREEN
===================================== */

function finishGame(){

document
.getElementById("gameScreen")
.classList.add("hidden");

document
.getElementById("finishScreen")
.classList.remove("hidden");

playClap();

launchConfetti();

}



/* =====================================
   CONFETTI
===================================== */

let confettiPieces=[];

function launchConfetti(){

const canvas=
document.getElementById(
"confettiCanvas"
);

const ctx=
canvas.getContext("2d");

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;



confettiPieces=[];

for(let i=0;i<250;i++){

confettiPieces.push({

x:
Math.random()*canvas.width,

y:
Math.random()*canvas.height-canvas.height,

r:
Math.random()*10+4,

d:
Math.random()*250,

color:
[
"#ff595e",
"#ffca3a",
"#8ac926",
"#1982c4",
"#6a4c93"
][Math.floor(Math.random()*5)],

tilt:
Math.random()*10-10,

tiltAngle:
0,

tiltAngleIncrement:
Math.random()*0.08+0.04

});

}



function drawConfetti(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



confettiPieces.forEach(p=>{

ctx.beginPath();

ctx.lineWidth=p.r;

ctx.strokeStyle=p.color;

ctx.moveTo(
p.x+p.tilt+p.r/2,
p.y
);

ctx.lineTo(
p.x+p.tilt,
p.y+p.tilt+p.r/2
);

ctx.stroke();

});



updateConfetti();

requestAnimationFrame(
drawConfetti
);

}



function updateConfetti(){

confettiPieces.forEach(p=>{

p.tiltAngle+=
p.tiltAngleIncrement;

p.y+=2;

p.tilt=
Math.sin(
p.tiltAngle
)*15;



if(p.y>
canvas.height){

p.y=-20;

p.x=
Math.random()*canvas.width;

}

});

}



drawConfetti();

}

</script>

</body>
</html>
